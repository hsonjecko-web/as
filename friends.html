<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>المتابعون</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
--primary-color: #6366f1;
--primary-gradient: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
--bg-color: #f8fafc;
--card-bg: #ffffff;
--text-main: #1e293b;
--text-secondary: #64748b;
--border-color: #e2e8f0;
--input-bg: #f1f5f9;
--shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
--nav-height: 70px;
--success-color: #10b981;
--danger-color: #ef4444;
--warning-color: #f59e0b;
}
body.dark-mode {
--bg-color: #0f172a;
--card-bg: #1e293b;
--text-main: #f1f5f9;
--text-secondary: #94a3b8;
--border-color: #334155;
--input-bg: #334155;
--shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
}
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; -webkit-tap-highlight-color: transparent; }
body { background-color: var(--bg-color); color: var(--text-main); padding-bottom: calc(var(--nav-height) + 20px); transition: background-color 0.3s ease; }
body.scroll-locked { overflow: hidden; }
header { position: sticky; top: 0; z-index: 100; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); padding: 15px 20px; box-shadow: var(--shadow); border-bottom: 1px solid var(--border-color); }
body.dark-mode header { background: rgba(30, 41, 59, 0.9); }
.header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
.page-title { font-size: 1.5rem; font-weight: 800; background: var(--primary-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.search-bar { position: relative; margin-bottom: 15px; }
.search-input { width: 100%; padding: 12px 45px 12px 15px; background-color: var(--input-bg); border: 2px solid transparent; border-radius: 16px; font-size: 0.95rem; color: var(--text-main); outline: none; transition: all 0.3s; }
.search-input:focus { border-color: var(--primary-color); background-color: var(--card-bg); }
.search-icon { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: var(--text-secondary); }
.tabs-container { display: flex; overflow-x: auto; padding: 0 20px 15px; gap: 10px; scrollbar-width: none; border-bottom: 1px solid var(--border-color); margin-bottom: 15px; }
.tabs-container::-webkit-scrollbar { display: none; }
.tab-btn { padding: 10px 20px; background: var(--input-bg); border: none; border-radius: 12px; font-size: 0.85rem; font-weight: 600; color: var(--text-secondary); cursor: pointer; white-space: nowrap; transition: all 0.3s; display: flex; align-items: center; gap: 6px; }
.tab-btn.active { background: var(--primary-gradient); color: white; box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3); }
.tab-btn .badge { background: var(--danger-color); color: white; font-size: 0.7rem; padding: 2px 8px; border-radius: 10px; min-width: 20px; text-align: center; }
.tab-content { display: none; padding: 0 20px; }
.tab-content.active { display: block; }
.user-card { background: var(--card-bg); border-radius: 20px; padding: 15px; margin-bottom: 12px; display: flex; align-items: center; gap: 15px; box-shadow: var(--shadow); border: 1px solid var(--border-color); transition: transform 0.2s; }
.user-card:hover { transform: translateX(-3px); }
.user-avatar { width: 55px; height: 55px; border-radius: 16px; object-fit: cover; cursor: pointer; border: 2px solid var(--primary-color); }
.user-info { flex: 1; }
.user-name { font-weight: 700; font-size: 1rem; margin-bottom: 3px; cursor: pointer; }
.user-name:hover { color: var(--primary-color); }
.user-username { font-size: 0.75rem; color: var(--text-secondary); direction: ltr; text-align: right; }
.user-meta { font-size: 0.7rem; color: var(--text-secondary); margin-top: 5px; }
.user-actions { display: flex; gap: 8px; }
.btn-action { padding: 8px 16px; border-radius: 10px; border: none; font-size: 0.75rem; font-weight: 600; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; gap: 5px; }
.btn-follow { background: var(--primary-gradient); color: white; }
.btn-following { background: var(--input-bg); color: var(--text-secondary); }
.btn-unfollow { background: var(--danger-color); color: white; }
.btn-message { background: var(--success-color); color: white; }
.btn-more { background: var(--input-bg); color: var(--text-secondary); width: 35px; height: 35px; border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
.suggestions-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 10px 0 20px; }
.suggestion-card { background: var(--card-bg); border-radius: 20px; padding: 20px; text-align: center; box-shadow: var(--shadow); border: 1px solid var(--border-color); }
.sugg-avatar { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; border: 3px solid var(--primary-color); margin-bottom: 10px; cursor: pointer; }
.sugg-name { font-weight: 700; font-size: 0.9rem; margin-bottom: 5px; cursor: pointer; }
.sugg-name:hover { color: var(--primary-color); }
.sugg-bio { font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 15px; min-height: 36px; }
.btn-suggest { width: 100%; padding: 10px; border-radius: 12px; border: none; font-weight: 600; cursor: pointer; }
.btn-suggest.follow { background: rgba(99, 102, 241, 0.1); color: var(--primary-color); }
.btn-suggest.following { background: var(--input-bg); color: var(--text-secondary); }
.empty-state { text-align: center; padding: 40px 20px; color: var(--text-secondary); }
.empty-state i { font-size: 3rem; margin-bottom: 15px; opacity: 0.3; }
.empty-state p { font-size: 0.9rem; margin-bottom: 20px; }
.loading { text-align: center; padding: 40px; color: var(--text-secondary); }
.bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: var(--nav-height); background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--border-color); box-shadow: 0 -4px 20px rgba(0,0,0,0.08); z-index: 1000; }
body.dark-mode .bottom-nav { background: rgba(30, 41, 59, 0.95); }
.nav-item { display: flex; flex-direction: column; align-items: center; text-decoration: none; color: var(--text-secondary); font-size: 0.7rem; gap: 6px; transition: all 0.3s; }
.nav-item i { font-size: 1.3rem; }
.nav-item.active { color: var(--primary-color); }
.nav-item.active i { transform: translateY(-3px); }
/* البروفايل مودال*/
.profile-modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); z-index: 2000; display: none; justify-content: center; align-items: flex-end; }
.profile-modal-overlay.show { display: flex; }
.profile-modal { background: var(--card-bg); width: 100%; max-width: 500px; height: 85vh; border-radius: 30px 30px 0 0; padding: 25px; overflow-y: auto; animation: slideUp 0.3s; position: relative; }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.close-modal { position: absolute; top: 20px; left: 20px; width: 35px; height: 35px; border-radius: 50%; background: var(--input-bg); border: none; color: var(--text-main); cursor: pointer; }
.profile-header { text-align: center; padding-top: 20px; margin-bottom: 20px; }
.profile-avatar-lg { width: 90px; height: 90px; border-radius: 22px; object-fit: cover; border: 4px solid var(--primary-color); margin-bottom: 12px; cursor: pointer; }
.profile-name { font-size: 1.3rem; font-weight: 800; }
.profile-username { color: var(--primary-color); font-size: 0.85rem; direction: ltr; }
.profile-bio { color: var(--text-secondary); font-size: 0.9rem; margin: 10px 0; }
.profile-stats { display: flex; justify-content: center; gap: 25px; padding: 15px; background: var(--input-bg); border-radius: 16px; margin: 15px 0; }
.stat-box b { display: block; font-size: 1.1rem; color: var(--text-main); }
.stat-box span { font-size: 0.75rem; color: var(--text-secondary); }
.profile-actions { display: flex; gap: 10px; }
.btn-profile { flex: 1; padding: 12px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; }
.btn-profile.primary { background: var(--primary-gradient); color: white; }
.btn-profile.secondary { background: var(--input-bg); color: var(--text-main); }
/*قائمة السياق*/
.context-menu { position: fixed; background: var(--card-bg); border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); z-index: 3000; min-width: 180px; overflow: hidden; border: 1px solid var(--border-color); display: none; animation: slideDown 0.2s; }
@keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
.context-item { padding: 14px 20px; display: flex; align-items: center; gap: 10px; cursor: pointer; font-size: 0.9rem; transition: background 0.2s; }
.context-item:hover { background: var(--input-bg); }
.context-item.danger { color: var(--danger-color); }
.context-item.danger:hover { background: rgba(239, 68, 68, 0.1); }
.context-divider { height: 1px; background: var(--border-color); margin: 5px 0; }
</style>
</head>
<body>

<header>
<div class="header-top">
<h1 class="page-title">المتابعون</h1>
<button id="theme-toggle" style="background:none; border:none; font-size:1.2rem; color:var(--text-main); cursor:pointer;"><i class="fas fa-moon"></i></button>
</div>
<div class="search-bar">
<i class="fas fa-search search-icon"></i>
<input type="text" class="search-input" placeholder="بحث عن مستخدم..." id="search-input">
</div>
</header>

<div class="tabs-container">
<button class="tab-btn active" data-tab="new-followers"><i class="fas fa-bell"></i> متابعون جدد <span class="badge" id="new-followers-count">0</span></button>
<button class="tab-btn" data-tab="following"><i class="fas fa-user-check"></i> أتابعهم <span class="badge" id="following-count">0</span></button>
<button class="tab-btn" data-tab="suggestions"><i class="fas fa-lightbulb"></i> مقترحات</button>
</div>

<main>
<!-- متابعون جدد -->
<div id="new-followers" class="tab-content active">
<div id="new-followers-container"><div class="loading"><i class="fas fa-spinner fa-spin"></i> جاري التحميل...</div></div>
</div>

<!-- أتابعهم -->
<div id="following" class="tab-content">
<div id="following-container"><div class="loading">جاري التحميل...</div></div>
</div>

<!-- مقترحات -->
<div id="suggestions" class="tab-content">
<div class="suggestions-grid" id="suggestions-container"><div class="loading">جاري التحميل...</div></div>
</div>
</main>

<nav class="bottom-nav">
<a href="home.html" class="nav-item"><i class="fas fa-home"></i><span>الرئيسية</span></a>
<a href="feed.html" class="nav-item"><i class="fas fa-newspaper"></i><span>المنشورات</span></a>
<a href="chat.html" class="nav-item"><i class="fas fa-comment-dots"></i><span>الدردشة</span></a>
<a href="friends.html" class="nav-item active"><i class="fas fa-user-friends"></i><span>المتابعون</span></a>
<a href="profile.html" class="nav-item"><i class="fas fa-user"></i><span>حسابي</span></a>
</nav>

<!-- مودال البروفايل -->
<div class="profile-modal-overlay" id="profileModal">
<div class="profile-modal">
<button class="close-modal" onclick="closeProfile()"><i class="fas fa-times"></i></button>
<div class="profile-header">
<img src="" alt="Profile" class="profile-avatar-lg" id="modal-img" onclick="openImageModal(this.src)">
<h2 class="profile-name" id="modal-name">اسم المستخدم</h2>
<p class="profile-username" id="modal-username">@username</p>
<p class="profile-bio" id="modal-bio">نبذة عن المستخدم</p>
<div class="profile-stats">
<div class="stat-box"><b id="modal-posts">0</b><span>منشور</span></div>
<div class="stat-box"><b id="modal-followers">0</b><span>متابع</span></div>
<div class="stat-box"><b id="modal-following">0</b><span>يتابع</span></div>
</div>
<div class="profile-actions">
<button class="btn-profile primary" id="modal-message-btn"><i class="fas fa-comment"></i> مراسلة</button>
<button class="btn-profile secondary" id="modal-follow-btn">متابعة</button>
</div>
</div>
</div>
</div>

<!-- قائمة السياق -->
<div class="context-menu" id="contextMenu">
<div class="context-item" id="ctx-message"><i class="fas fa-comment"></i> مراسلة</div>
<div class="context-item" id="ctx-profile"><i class="fas fa-user"></i> الملف الشخصي</div>
<div class="context-divider"></div>
<div class="context-item danger" id="ctx-block"><i class="fas fa-ban"></i> حظر المستخدم</div>
</div>

<script type="module">
import { db, collection, query, where, onSnapshot, doc, getDoc, getDocs, updateDoc, addDoc, arrayUnion, arrayRemove, serverTimestamp, increment } from './firebase-config.js';

const currentUser = JSON.parse(localStorage.getItem('currentUser'));
if (!currentUser || !currentUser.isLoggedIn) { window.location.href = 'index.html'; }

let allUsers = [], myFollowing = [], myFollowers = [], blockedUsers = new Set();
let currentProfileUser = null;
let currentContextMenuUserId = null;

// === تهيئة التبويبات ===
document.querySelectorAll('.tab-btn').forEach(btn => {
btn.addEventListener('click', () => {
document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
btn.classList.add('active');
document.getElementById(btn.dataset.tab).classList.add('active');
if (btn.dataset.tab === 'suggestions') renderSuggestions();
});
});

// === البحث ===
document.getElementById('search-input').addEventListener('input', (e) => {
const q = e.target.value.toLowerCase();
const activeTab = document.querySelector('.tab-btn.active').dataset.tab;
if (activeTab === 'following') {
renderFollowing(myFollowing.filter(u => u.fullName?.toLowerCase().includes(q) || u.username?.toLowerCase().includes(q)));
} else if (activeTab === 'suggestions') {
renderSuggestions(q);
} else if (activeTab === 'new-followers') {
renderNewFollowers(myFollowers.filter(u => u.fullName?.toLowerCase().includes(q) || u.username?.toLowerCase().includes(q)));
}
});

// === تحميل البيانات الأولية ===
async function loadInitialData() {
try {
const userRef = doc(db, "users", currentUser.uid);
const userSnap = await getDoc(userRef);
if (userSnap.exists()) {
const userData = userSnap.data();
myFollowing = userData.following || [];
myFollowers = userData.followers || [];
blockedUsers = new Set(userData.blocked || []);
document.getElementById('following-count').textContent = myFollowing.length;
}
} catch (error) { console.error('Error loading data:', error); }
}

// === بدء الاستماع للبيانات ===
function startListeners() {
// مستمع لتحديث بيانات المستخدم الحالي
onSnapshot(doc(db, "users", currentUser.uid), (userSnap) => {
if (userSnap.exists()) {
const userData = userSnap.data();
myFollowing = userData.following || [];
myFollowers = userData.followers || [];
document.getElementById('following-count').textContent = myFollowing.length;
renderFollowing();
renderNewFollowers();
}
});

// تحميل جميع المستخدمين للمقترحات والمتابعين
onSnapshot(collection(db, "users"), async (snapshot) => {
allUsers = [];
for (const docSnap of snapshot.docs) {
if (docSnap.id === currentUser.uid) continue;
const user = docSnap.data();
if (user.banned || blockedUsers.has(docSnap.id)) continue;
try {
const userDoc = await getDoc(doc(db, "users", docSnap.id));
if (userDoc.exists()) {
allUsers.push({ id: docSnap.id, ...userDoc.data() });
}
} catch (e) { allUsers.push({ id: docSnap.id, ...user }); }
}
renderNewFollowers();
renderFollowing();
renderSuggestions();
});
}

// === عرض المتابعين الجدد ===
function renderNewFollowers(filtered) {
const container = document.getElementById('new-followers-container');
const list = filtered || myFollowers.map(fid => allUsers.find(u => u.id === fid)).filter(Boolean);

if (list.length === 0) {
container.innerHTML = '<div class="empty-state"><i class="fas fa-bell"></i><p>لا يوجد متابعون جدد بعد</p></div>';
return;
}

// ترتيب حسب الأحدث (يمكن تحسينه بحقل lastFollowedAt)
list.sort((a, b) => {
const timeA = a.lastFollowedAt?.[currentUser.uid] || a.createdAt || 0;
const timeB = b.lastFollowedAt?.[currentUser.uid] || b.createdAt || 0;
return new Date(timeB) - new Date(timeA);
}).slice(0, 20);

container.innerHTML = list.map(user => {
const isFollowing = myFollowing.includes(user.id);
const followedAt = user.lastFollowedAt?.[currentUser.uid];
return `
<div class="user-card">
<img src="${user.profileImage || 'https://i.pravatar.cc/150?u='+user.username}" class="user-avatar" onclick="openProfile('${user.id}')">
<div class="user-info">
<div class="user-name" onclick="openProfile('${user.id}')">${escapeHtml(user.fullName || user.username)}</div>
<div class="user-username">@${escapeHtml(user.username || user.id)}</div>
<div class="user-meta">${followedAt ? 'تابعك ' + formatTime(followedAt) : 'متابع جديد'}</div>
</div>
<div class="user-actions">
<button class="btn-action btn-message" onclick="event.stopPropagation(); startChat('${user.id}', '${escapeHtml(user.fullName || user.username)}')"><i class="fas fa-comment"></i></button>
<button class="btn-action ${isFollowing ? 'btn-unfollow' : 'btn-follow'}" onclick="event.stopPropagation(); toggleFollow('${user.id}')">
${isFollowing ? '<i class="fas fa-user-minus"></i> إلغاء' : '<i class="fas fa-user-plus"></i> متابعة'}
</button>
</div>
</div>`;
}).join('');

document.getElementById('new-followers-count').textContent = list.length;
document.getElementById('new-followers-count').style.display = list.length > 0 ? 'inline-block' : 'none';
}

// === عرض من أتابعهم ===
function renderFollowing(filtered) {
const container = document.getElementById('following-container');
const list = filtered || myFollowing.map(fid => allUsers.find(u => u.id === fid)).filter(Boolean);

if (list.length === 0) {
container.innerHTML = '<div class="empty-state"><i class="fas fa-user-check"></i><p>لا تتابع أحداً بعد</p><button class="btn-action btn-follow" style="width:auto; margin-top:10px;" onclick="switchTab(\'suggestions\')">استكشف المقترحات</button></div>';
return;
}

container.innerHTML = list.map(user => `
<div class="user-card">
<img src="${user.profileImage || 'https://i.pravatar.cc/150?u='+user.username}" class="user-avatar" onclick="openProfile('${user.id}')">
<div class="user-info">
<div class="user-name" onclick="openProfile('${user.id}')">${escapeHtml(user.fullName || user.username)}</div>
<div class="user-username">@${escapeHtml(user.username || user.id)}</div>
<div class="user-meta">${escapeHtml(user.bio?.substring(0, 30) || 'لا توجد نبذة')}...</div>
</div>
<div class="user-actions">
<button class="btn-action btn-message" onclick="event.stopPropagation(); startChat('${user.id}', '${escapeHtml(user.fullName || user.username)}')"><i class="fas fa-comment"></i></button>
<button class="btn-action btn-unfollow" onclick="event.stopPropagation(); toggleFollow('${user.id}')"><i class="fas fa-user-minus"></i> إلغاء</button>
<button class="btn-more" onclick="event.stopPropagation(); showContextMenu(event, '${user.id}')"><i class="fas fa-ellipsis-h"></i></button>
</div>
</div>
`).join('');
}

// === عرض المقترحات ===
function renderSuggestions(searchQuery) {
const container = document.getElementById('suggestions-container');
container.innerHTML = '<div class="loading" style="grid-column: span 2;"><i class="fas fa-spinner fa-spin"></i> جاري التحميل...</div>';

let suggestions = allUsers.filter(u => {
const isFollowing = myFollowing.includes(u.id);
const isFollower = myFollowers.includes(u.id);
const matchesSearch = !searchQuery || u.fullName?.toLowerCase().includes(searchQuery) || u.username?.toLowerCase().includes(searchQuery);
return !isFollowing && matchesSearch;
}).slice(0, 10);

if (suggestions.length === 0) {
container.innerHTML = '<div class="empty-state" style="grid-column: span 2;"><i class="fas fa-lightbulb"></i><p>' + (searchQuery ? 'لا توجد نتائج' : 'لا توجد مقترحات حالياً') + '</p></div>';
return;
}

container.innerHTML = suggestions.map(user => {
const isFollowing = myFollowing.includes(user.id);
return `
<div class="suggestion-card">
<img src="${user.profileImage || 'https://i.pravatar.cc/150?u='+user.username}" class="sugg-avatar" onclick="openProfile('${user.id}')">
<div class="sugg-name" onclick="openProfile('${user.id}')">${escapeHtml(user.fullName || user.username)}</div>
<div class="sugg-bio">${escapeHtml(user.bio?.substring(0, 40) || 'مستخدم جديد')}</div>
<button class="btn-suggest ${isFollowing ? 'following' : 'follow'}" onclick="toggleFollow('${user.id}')">
${isFollowing ? '<i class="fas fa-check"></i> تتابع' : '<i class="fas fa-user-plus"></i> متابعة'}
</button>
</div>`;
}).join('');
}

// === متابعة / إلغاء متابعة ===
window.toggleFollow = async function(userId) {
try {
const isFollowing = myFollowing.includes(userId);
const userRef = doc(db, "users", currentUser.uid);
const targetRef = doc(db, "users", userId);

if (isFollowing) {
// إلغاء المتابعة
await updateDoc(userRef, { following: arrayRemove(userId) });
await updateDoc(targetRef, { followers: arrayRemove(currentUser.uid) });
myFollowing = myFollowing.filter(id => id !== userId);
showAlert('success', 'تم الإلغاء', 'تم إلغاء متابعة المستخدم');
} else {
// متابعة جديدة
await updateDoc(userRef, { 
following: arrayUnion(userId),
[`lastFollowedAt.${userId}`]: serverTimestamp()
});
await updateDoc(targetRef, { 
followers: arrayUnion(currentUser.uid),
[`lastFollowedAt.${currentUser.uid}`]: serverTimestamp()
});
myFollowing.push(userId);

// إشعار للمستخدم المتابَع
await addDoc(collection(db, "notifications"), {
type: 'new_follower',
targetUserId: userId,
senderId: currentUser.uid,
senderName: currentUser.fullName || currentUser.username,
senderAvatar: currentUser.profileImage || '',
title: '👤 متابع جديد',
body: `${currentUser.fullName || currentUser.username} بدأ متابعتك`,
isRead: false,
timestamp: serverTimestamp()
});

showAlert('success', 'تمت المتابعة', 'أصبحت تتابع هذا المستخدم');
}
renderFollowing();
renderNewFollowers();
renderSuggestions();
if (currentProfileUser?.id === userId) openProfile(userId); // تحديث البروفايل إذا مفتوح
} catch (error) {
console.error('Error toggling follow:', error);
showAlert('error', 'خطأ', 'حدث خطأ: ' + error.message);
}
}

// === الدردشة المباشرة ===
window.startChat = function(userId, userName) {
window.location.href = 'chat.html?targetId=' + userId + '&targetName=' + encodeURIComponent(userName);
}

// === عرض البروفايل ===
window.openProfile = async function(userId) {
currentProfileUser = null;
try {
const userSnap = await getDoc(doc(db, "users", userId));
if (!userSnap.exists()) return;
const user = userSnap.data();
currentProfileUser = { id: userId, ...user };

document.getElementById('modal-name').textContent = user.fullName || user.username;
document.getElementById('modal-username').textContent = user.username ? '@' + user.username : '';
document.getElementById('modal-img').src = user.profileImage || 'https://i.pravatar.cc/150';
document.getElementById('modal-bio').textContent = user.bio || 'لا توجد نبذة';
document.getElementById('modal-posts').textContent = user.stats?.postsCount || 0;
document.getElementById('modal-followers').textContent = user.followers?.length || 0;
document.getElementById('modal-following').textContent = user.following?.length || 0;

const followBtn = document.getElementById('modal-follow-btn');
const isFollowing = myFollowing.includes(userId);
const isMe = userId === currentUser.uid;

if (isMe) {
followBtn.style.display = 'none';
} else {
followBtn.style.display = 'block';
followBtn.textContent = isFollowing ? 'تتابع ✓' : 'متابعة';
followBtn.className = 'btn-profile ' + (isFollowing ? 'secondary' : 'primary');
followBtn.onclick = () => toggleFollow(userId);
}

document.getElementById('modal-message-btn').onclick = () => startChat(userId, user.fullName || user.username);
document.getElementById('profileModal').classList.add('show');
document.body.classList.add('scroll-locked');
} catch (error) {
console.error('Error opening profile:', error);
}
}

window.closeProfile = function() {
document.getElementById('profileModal').classList.remove('show');
document.body.classList.remove('scroll-locked');
currentProfileUser = null;
}

document.getElementById('profileModal').addEventListener('click', (e) => {
if (e.target.id === 'profileModal') closeProfile();
});

// === قائمة السياق ===
window.showContextMenu = function(event, userId) {
event.stopPropagation();
currentContextMenuUserId = userId;
const menu = document.getElementById('contextMenu');
const rect = event.target.getBoundingClientRect();
menu.style.top = (rect.bottom + 5) + 'px';
menu.style.left = Math.min(rect.left, window.innerWidth - 200) + 'px';
menu.style.display = 'block';

document.getElementById('ctx-message').onclick = () => { startChat(userId, ''); hideContextMenu(); };
document.getElementById('ctx-profile').onclick = () => { openProfile(userId); hideContextMenu(); };
document.getElementById('ctx-block').onclick = () => { blockUser(userId); };
}

window.hideContextMenu = function() {
document.getElementById('contextMenu').style.display = 'none';
currentContextMenuUserId = null;
}

document.addEventListener('click', (e) => {
if (!e.target.closest('.context-menu') && !e.target.closest('.btn-more')) {
hideContextMenu();
}
});

// === حظر مستخدم ===
window.blockUser = async function(userId) {
if (!confirm('هل تريد حظر هذا المستخدم؟\nسيتم إزالة المتابعة من الطرفين')) return;
try {
await updateDoc(doc(db, "users", currentUser.uid), {
blocked: arrayUnion(userId),
following: arrayRemove(userId)
});
await updateDoc(doc(db, "users", userId), {
followers: arrayRemove(currentUser.uid)
});
blockedUsers.add(userId);
myFollowing = myFollowing.filter(id => id !== userId);
renderFollowing();
renderSuggestions();
hideContextMenu();
showAlert('success', 'تم الحظر', 'تم حظر المستخدم وإلغاء المتابعة');
} catch (error) {
console.error('Error blocking user:', error);
showAlert('error', 'خطأ', error.message);
}
}

// === تبديل التبويبات ===
window.switchTab = function(tabName) {
document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
document.querySelector(`[data-tab="${tabName}"]`).classList.add('active');
document.getElementById(tabName).classList.add('active');
if (tabName === 'suggestions') renderSuggestions();
}

// === دوال مساعدة ===
function formatTime(timestamp) {
if (!timestamp) return '';
const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
const now = new Date();
const diff = now - date;
if (diff < 60000) return 'الآن';
if (diff < 3600000) return Math.floor(diff / 60000) + ' دقيقة';
if (diff < 86400000) return Math.floor(diff / 3600000) + ' ساعة';
return date.toLocaleDateString('ar-SA');
}

function escapeHtml(text) {
if (!text) return '';
const div = document.createElement('div');
div.textContent = text;
return div.innerHTML;
}

window.showAlert = function(type, title, message) {
const alert = document.createElement('div');
alert.style.cssText = `position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--card-bg);border-radius:16px;padding:15px 25px;box-shadow:0 10px 40px rgba(0,0,0,0.2);z-index:4000;display:flex;align-items:center;gap:10px;animation:slideDown 0.3s;border-right:4px solid ${type==='success'?'var(--success-color)':type==='error'?'var(--danger-color)':'var(--warning-color)'}`;
alert.innerHTML = `<i class="fas fa-${type==='success'?'check-circle':type==='error'?'exclamation-circle':'info-circle'}" style="color:${type==='success'?'var(--success-color)':type==='error'?'var(--danger-color)':'var(--warning-color)'}"></i><div><b>${title}</b><br><small style="color:var(--text-secondary)">${message}</small></div>`;
document.body.appendChild(alert);
setTimeout(() => alert.remove(), 3000);
}

window.openImageModal = function(src) {
const win = window.open();
win.document.write('<iframe src="'+src+'" frameborder="0" style="border:0;width:100%;height:100%"></iframe>');
}

// === الوضع الليلي ===
document.getElementById('theme-toggle').addEventListener('click', () => {
document.body.classList.toggle('dark-mode');
const icon = document.querySelector('#theme-toggle i');
icon.classList.toggle('fa-moon');
icon.classList.toggle('fa-sun');
localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
});

// === التهيئة ===
(async function init() {
if (localStorage.getItem('darkMode') === 'true') document.body.classList.add('dark-mode');
await loadInitialData();
startListeners();
console.log('🚀 === FOLLOWERS PAGE READY ===');
})();
</script>
</body>
</html>
