<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>الأصدقاء</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #6366f1;
            --primary-gradient: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-secondary: #64748b;
            --border-color: #e2e8f0;
            --input-bg: #f1f5f9;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --nav-height: 70px;
            --success-color: #10b981;
            --danger-color: #ef4444;
            --warning-color: #f59e0b;
        }
        body.dark-mode {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f1f5f9;
            --text-secondary: #94a3b8;
            --border-color: #334155;
            --input-bg: #334155;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding-bottom: calc(var(--nav-height) + 20px);
            transition: background-color 0.3s ease;
        }
        body.scroll-locked {
            overflow: hidden;
        }
        
        /* === الهيدر === */
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            padding: 15px 20px;
            box-shadow: var(--shadow);
            border-bottom: 1px solid var(--border-color);
        }
        body.dark-mode header {
            background: rgba(30, 41, 59, 0.9);
        }
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .page-title {
            font-size: 1.5rem;
            font-weight: 800;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .search-bar {
            position: relative;
            margin-bottom: 15px;
        }
        .search-input {
            width: 100%;
            padding: 12px 45px 12px 15px;
            background-color: var(--input-bg);
            border: 2px solid transparent;
            border-radius: 16px;
            font-size: 0.95rem;
            color: var(--text-main);
            outline: none;
            transition: all 0.3s;
        }
        .search-input:focus {
            border-color: var(--primary-color);
            background-color: var(--card-bg);
        }
        .search-icon {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
        }
        
        /* === التبويبات === */
        .tabs-container {
            display: flex;
            overflow-x: auto;
            padding: 0 20px 15px;
            gap: 10px;
            scrollbar-width: none;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 15px;
        }
        .tabs-container::-webkit-scrollbar {
            display: none;
        }
        .tab-btn {
            padding: 10px 20px;
            background: var(--input-bg);
            border: none;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .tab-btn.active {
            background: var(--primary-gradient);
            color: white;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }
        .tab-btn .badge {
            background: var(--danger-color);
            color: white;
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 10px;
            min-width: 20px;
            text-align: center;
        }
        
        /* === محتوى التبويبات === */
        .tab-content {
            display: none;
            padding: 0 20px;
        }
        .tab-content.active {
            display: block;
        }
        
        /* === بطاقات الطلبات === */
        .requests-scroll {
            display: flex;
            overflow-x: auto;
            padding: 10px 0;
            gap: 15px;
            scrollbar-width: none;
        }
        .requests-scroll::-webkit-scrollbar {
            display: none;
        }
        .request-card {
            min-width: 280px;
            background: var(--card-bg);
            border-radius: 20px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            position: relative;
        }
        .request-card::before {
            content: '';
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 5px;
            background: var(--primary-gradient);
            border-radius: 0 20px 20px 0;
        }
        .request-card.sent::before {
            background: linear-gradient(135deg, var(--warning-color), #fbbf24);
        }
        .req-avatar {
            width: 60px;
            height: 60px;
            border-radius: 16px;
            object-fit: cover;
            cursor: pointer;
        }
        .req-info {
            flex: 1;
        }
        .req-name {
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 4px;
            cursor: pointer;
        }
        .req-name:hover {
            color: var(--primary-color);
        }
        .req-mutual {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }
        .req-time {
            font-size: 0.7rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }
        .req-actions {
            display: flex;
            gap: 8px;
        }
        .btn-req {
            padding: 8px 16px;
            border-radius: 10px;
            border: none;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-accept {
            background: var(--primary-gradient);
            color: white;
            box-shadow: 0 4px 10px rgba(99, 102, 241, 0.3);
        }
        .btn-accept:hover {
            transform: scale(1.05);
        }
        .btn-decline {
            background: var(--input-bg);
            color: var(--text-secondary);
        }
        .btn-decline:hover {
            background: var(--danger-color);
            color: white;
        }
        .btn-cancel {
            background: var(--input-bg);
            color: var(--warning-color);
            border: 1px solid var(--warning-color);
        }
        .btn-cancel:hover {
            background: var(--warning-color);
            color: white;
        }
        
        /* === اقتراحات الأصدقاء === */
        .suggestions-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 10px 0 20px;
        }
        .suggestion-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            transition: transform 0.3s;
        }
        .suggestion-card:hover {
            transform: translateY(-5px);
        }
        .sugg-avatar-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 10px;
        }
        .sugg-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--primary-color);
            padding: 3px;
            background: var(--card-bg);
            cursor: pointer;
        }
        .sugg-name {
            font-weight: 700;
            font-size: 0.95rem;
            margin-bottom: 5px;
            cursor: pointer;
        }
        .sugg-name:hover {
            color: var(--primary-color);
        }
        .sugg-job {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 15px;
        }
        .btn-add {
            width: 100%;
            padding: 10px;
            background: rgba(99, 102, 241, 0.1);
            color: var(--primary-color);
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-add:hover {
            background: var(--primary-gradient);
            color: white;
        }
        .btn-add.sent {
            background: var(--warning-color);
            color: white;
        }
        
        /* === قائمة الأصدقاء === */
        .friends-list {
            padding: 10px 0 20px;
        }
        .friend-item {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 18px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            cursor: pointer;
            transition: transform 0.2s;
        }
        .friend-item:hover {
            transform: translateX(-5px);
        }
        .friend-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .friend-avatar-wrapper {
            position: relative;
        }
        .friend-avatar {
            width: 50px;
            height: 50px;
            border-radius: 14px;
            object-fit: cover;
        }
        .status-dot {
            position: absolute;
            bottom: -2px;
            right: -2px;
            width: 14px;
            height: 14px;
            background: var(--success-color);
            border: 2px solid var(--card-bg);
            border-radius: 50%;
        }
        .status-dot.offline {
            background: var(--text-secondary);
        }
        .friend-info h4 {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 2px;
        }
        .friend-info p {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }
        .friend-actions {
            display: flex;
            gap: 8px;
        }
        .friend-actions button {
            background: var(--input-bg);
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 10px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .friend-actions button:hover {
            background: var(--primary-color);
            color: white;
        }
        .friend-actions button.danger:hover {
            background: var(--danger-color);
        }
        
        /* === قائمة السياق (لحظر/إزالة) === */
        .context-menu {
            position: fixed;
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            z-index: 3000;
            min-width: 180px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            animation: slideDown 0.2s ease;
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .context-item {
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 0.9rem;
        }
        .context-item:hover {
            background: var(--input-bg);
        }
        .context-item.danger {
            color: var(--danger-color);
        }
        .context-item.danger:hover {
            background: rgba(239, 68, 68, 0.1);
        }
        .context-divider {
            height: 1px;
            background: var(--border-color);
            margin: 5px 0;
        }
        
        /* === الفوتر === */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: var(--nav-height);
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid var(--border-color);
            box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
            z-index: 1000;
        }
        body.dark-mode .bottom-nav {
            background: rgba(30, 41, 59, 0.95);
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 0.7rem;
            gap: 6px;
            transition: all 0.3s;
        }
        .nav-item i {
            font-size: 1.3rem;
        }
        .nav-item.active {
            color: var(--primary-color);
        }
        .nav-item.active i {
            transform: translateY(-3px);
        }
        
        /* === مودال البروفايل === */
        .profile-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: flex-end;
        }
        .profile-modal-overlay.show {
            display: flex;
        }
        .profile-modal {
            background: var(--card-bg);
            width: 100%;
            max-width: 500px;
            height: 85vh;
            border-radius: 30px 30px 0 0;
            padding: 25px;
            overflow-y: auto;
            animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        .close-modal {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: var(--input-bg);
            border: none;
            color: var(--text-main);
            cursor: pointer;
            z-index: 10;
        }
        .profile-header {
            text-align: center;
            margin-bottom: 25px;
            padding-top: 20px;
        }
        .profile-avatar-lg {
            width: 100px;
            height: 100px;
            border-radius: 25px;
            object-fit: cover;
            border: 4px solid var(--primary-color);
            margin-bottom: 15px;
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.3);
            cursor: pointer;
        }
        .profile-name {
            font-size: 1.4rem;
            font-weight: 800;
            margin-bottom: 5px;
        }
        .profile-username {
            font-size: 0.9rem;
            color: var(--primary-color);
            font-weight: 600;
            margin-bottom: 10px;
            direction: ltr;
        }
        .profile-bio {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 20px;
        }
        .profile-stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 25px;
            padding: 15px;
            background: var(--input-bg);
            border-radius: 16px;
        }
        .stat-box b {
            display: block;
            font-size: 1.2rem;
            color: var(--text-main);
        }
        .stat-box span {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
        .profile-actions {
            display: flex;
            gap: 10px;
        }
        .btn-profile {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            border: none;
            font-weight: 700;
            cursor: pointer;
        }
        .btn-primary {
            background: var(--primary-gradient);
            color: white;
        }
        .btn-secondary {
            background: var(--input-bg);
            color: var(--text-main);
        }
        .btn-danger {
            background: var(--danger-color);
            color: white;
        }
        
        /* === حالة فارغة === */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }
        .empty-state i {
            font-size: 3rem;
            margin-bottom: 15px;
            opacity: 0.3;
        }
        .empty-state p {
            font-size: 0.9rem;
            margin-bottom: 20px;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <!-- الهيدر -->
    <header>
        <div class="header-top">
            <h1 class="page-title">الأصدقاء</h1>
            <button id="theme-toggle" style="background:none; border:none; font-size:1.2rem; color:var(--text-main); cursor:pointer;">
                <i class="fas fa-moon"></i>
            </button>
        </div>
        <div class="search-bar">
            <i class="fas fa-search search-icon"></i>
            <input type="text" class="search-input" placeholder="بحث عن صديق..." id="search-input">
        </div>
    </header>

    <!-- التبويبات -->
    <div class="tabs-container">
        <button class="tab-btn active" data-tab="incoming">
            <i class="fas fa-inbox"></i>
            الواردة
            <span class="badge" id="incoming-count">0</span>
        </button>
        <button class="tab-btn" data-tab="sent">
            <i class="fas fa-paper-plane"></i>
            المرسلة
            <span class="badge" id="sent-count">0</span>
        </button>
        <button class="tab-btn" data-tab="friends">
            <i class="fas fa-users"></i>
            أصدقائي
            <span class="badge" id="friends-count">0</span>
        </button>
        <button class="tab-btn" data-tab="suggestions">
            <i class="fas fa-lightbulb"></i>
            مقترحات
        </button>
    </div>

    <!-- محتوى التبويبات -->
    <main>
        <!-- الطلبات الواردة -->
        <div id="incoming" class="tab-content active">
            <div class="requests-scroll" id="incoming-container">
                <div class="loading"><i class="fas fa-spinner fa-spin"></i> جاري التحميل...</div>
            </div>
        </div>

        <!-- الطلبات المرسلة -->
        <div id="sent" class="tab-content">
            <div class="requests-scroll" id="sent-container">
                <div class="loading"><i class="fas fa-spinner fa-spin"></i> جاري التحميل...</div>
            </div>
        </div>

        <!-- الأصدقاء -->
        <div id="friends" class="tab-content">
            <div class="friends-list" id="friends-list-container">
                <div class="loading">جاري تحميل الأصدقاء...</div>
            </div>
        </div>

        <!-- المقترحات -->
        <div id="suggestions" class="tab-content">
            <div class="suggestions-grid" id="suggestions-container">
                <div class="loading">جاري تحميل الاقتراحات...</div>
            </div>
        </div>
    </main>

    <!-- الفوتر -->
    <nav class="bottom-nav">
        <a href="home.html" class="nav-item"><i class="fas fa-home"></i><span>الرئيسية</span></a>
        <a href="feed.html" class="nav-item"><i class="fas fa-newspaper"></i><span>المنشورات</span></a>
        <a href="chat.html" class="nav-item"><i class="fas fa-comment-dots"></i><span>الدردشة</span></a>
        <a href="friends.html" class="nav-item active"><i class="fas fa-user-friends"></i><span>الأصدقاء</span></a>
        <a href="profile.html" class="nav-item"><i class="fas fa-user"></i><span>حسابي</span></a>
    </nav>

    <!-- نافذة البروفايل -->
    <div class="profile-modal-overlay" id="profileModal">
        <div class="profile-modal">
            <button class="close-modal" onclick="closeProfile()"><i class="fas fa-times"></i></button>
            <div class="profile-header">
                <img src="" alt="Profile" class="profile-avatar-lg" id="modal-img">
                <h2 class="profile-name" id="modal-name">اسم المستخدم</h2>
                <p class="profile-username" id="modal-username">@username</p>
                <p class="profile-bio" id="modal-bio">نبذة عن المستخدم</p>
                <div class="profile-stats">
                    <div class="stat-box"><b id="modal-posts">0</b><span>منشور</span></div>
                    <div class="stat-box"><b id="modal-followers">0</b><span>متابع</span></div>
                    <div class="stat-box"><b id="modal-following">0</b><span>يتابع</span></div>
                </div>
                <div class="profile-actions">
                    <button class="btn-profile btn-primary" id="modal-message-btn">مراسلة</button>
                    <button class="btn-profile btn-secondary" id="modal-action-btn">إضافة</button>
                </div>
            </div>
            <h3 style="font-size:1.1rem; margin:20px 0 15px; border-right:4px solid var(--primary-color); padding-right:10px;">آخر النشاطات</h3>
            <div style="color:var(--text-secondary); font-size:0.9rem; line-height:1.8;" id="modal-activities">
                جاري تحميل النشاطات...
            </div>
        </div>
    </div>

    <!-- قائمة السياق -->
    <div class="context-menu" id="contextMenu" style="display:none;">
        <div class="context-item" id="ctx-message">
            <i class="fas fa-comment"></i> مراسلة
        </div>
        <div class="context-item" id="ctx-profile">
            <i class="fas fa-user"></i> الملف الشخصي
        </div>
        <div class="context-divider"></div>
        <div class="context-item danger" id="ctx-block">
            <i class="fas fa-ban"></i> حظر المستخدم
        </div>
        <div class="context-item danger" id="ctx-remove">
            <i class="fas fa-user-minus"></i> إزالة من الأصدقاء
        </div>
    </div>

    <script type="module">
        import { 
            db, collection, query, where, onSnapshot, doc, getDoc, 
            updateDoc, addDoc, arrayUnion, arrayRemove, serverTimestamp, 
            increment, deleteDoc, orderBy, limit 
        } from './firebase-config.js';

        console.log('🚀 === FRIENDS PAGE STARTING ===');

        // === المستخدم الحالي ===
        const currentUser = JSON.parse(localStorage.getItem('currentUser'));
        if (!currentUser || !currentUser.isLoggedIn) {
            window.location.href = 'index.html';
        }

        // === المتغيرات العامة ===
        let allFriends = [];
        let allIncomingRequests = [];
        let allSentRequests = [];
        let allUsers = [];
        let pendingSentRequests = new Set();
        let blockedUsers = new Set();
        let currentContextMenuUserId = null;

        // === تهيئة التبويبات ===
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(btn.dataset.tab).classList.add('active');
            });
        });

        // === البحث ===
        document.getElementById('search-input').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const activeTab = document.querySelector('.tab-btn.active').dataset.tab;
            
            if (activeTab === 'friends') {
                const filtered = allFriends.filter(f => 
                    f.fullName?.toLowerCase().includes(query) || 
                    f.username?.toLowerCase().includes(query)
                );
                renderFriends(filtered);
            } else if (activeTab === 'suggestions') {
                renderSuggestions(query);
            }
        });

        // === تحميل البيانات المحظورة (الأصدقاء، الطلبات، المحظورين) ===
        async function loadBlockedData() {
            try {
                // تحميل الأصدقاء
                const userRef = doc(db, "users", currentUser.uid);
                const userSnap = await getDoc(userRef);
                if (userSnap.exists()) {
                    const userData = userSnap.data();
                    (userData.friends || []).forEach(id => allFriends.push({ id }));
                    (userData.blocked || []).forEach(id => blockedUsers.add(id));
                }

                // تحميل الطلبات الواردة
                const incomingQuery = query(
                    collection(db, "requests"), 
                    where("toUserId", "==", currentUser.uid),
                    where("type", "==", "friend"),
                    where("status", "==", "pending")
                );
                const incomingSnap = await getDoc(incomingQuery);
                
                // تحميل الطلبات المرسلة
                const sentQuery = query(
                    collection(db, "requests"),
                    where("fromUserId", "==", currentUser.uid),
                    where("type", "==", "friend"),
                    where("status", "==", "pending")
                );
                const sentSnap = await getDoc(sentQuery);
                sentSnap.forEach(d => pendingSentRequests.add(d.data().toUserId));

            } catch (error) {
                console.error('Error loading blocked data:', error);
            }
        }

        // === بدء الاستماع للبيانات الحية ===
        function startListeners() {
            console.log('📡 Starting listeners...');

            // الاستماع للأصدقاء
            onSnapshot(doc(db, "users", currentUser.uid), async (userSnap) => {
                const userData = userSnap.data();
                const friendsIds = userData.friends || [];
                document.getElementById('friends-count').textContent = `${friendsIds.length}`;
                
                if (friendsIds.length > 0) {
                    const friendsQuery = query(collection(db, "users"), where("uid", "in", friendsIds.slice(0, 20)));
                    onSnapshot(friendsQuery, (snapshot) => {
                        allFriends = [];
                        snapshot.forEach(doc => { 
                            const user = doc.data();
                            if (!blockedUsers.has(doc.id)) {
                                allFriends.push({ id: doc.id, ...user }); 
                            }
                        });
                        renderFriends(allFriends);
                    });
                } else {
                    renderFriends([]);
                }
            });

            // الاستماع للطلبات الواردة
            const incomingQuery = query(
                collection(db, "requests"), 
                where("toUserId", "==", currentUser.uid),
                where("type", "==", "friend"),
                where("status", "==", "pending"),
                orderBy("timestamp", "desc")
            );
            onSnapshot(incomingQuery, async (snapshot) => {
                allIncomingRequests = [];
                for (const docSnap of snapshot.docs) {
                    const req = docSnap.data();
                    try {
                        const userSnap = await getDoc(doc(db, "users", req.fromUserId));
                        if (userSnap.exists()) {
                            allIncomingRequests.push({ 
                                id: docSnap.id, 
                                ...req, 
                                userData: userSnap.data() 
                            });
                        }
                    } catch (e) {
                        allIncomingRequests.push({ id: docSnap.id, ...req });
                    }
                }
                document.getElementById('incoming-count').textContent = allIncomingRequests.length;
                document.getElementById('incoming-count').style.display = 
                    allIncomingRequests.length > 0 ? 'inline-block' : 'none';
                renderIncomingRequests();
            });

            // الاستماع للطلبات المرسلة
            const sentQuery = query(
                collection(db, "requests"),
                where("fromUserId", "==", currentUser.uid),
                where("type", "==", "friend"),
                where("status", "==", "pending"),
                orderBy("timestamp", "desc")
            );
            onSnapshot(sentQuery, async (snapshot) => {
                allSentRequests = [];
                for (const docSnap of snapshot.docs) {
                    const req = docSnap.data();
                    try {
                        const userSnap = await getDoc(doc(db, "users", req.toUserId));
                        if (userSnap.exists()) {
                            allSentRequests.push({ 
                                id: docSnap.id, 
                                ...req, 
                                userData: userSnap.data() 
                            });
                        }
                    } catch (e) {
                        allSentRequests.push({ id: docSnap.id, ...req });
                    }
                }
                document.getElementById('sent-count').textContent = allSentRequests.length;
                document.getElementById('sent-count').style.display = 
                    allSentRequests.length > 0 ? 'inline-block' : 'none';
                renderSentRequests();
            });

            // الاستماع لجميع المستخدمين للمقترحات
            onSnapshot(collection(db, "users"), (snapshot) => {
                allUsers = [];
                snapshot.forEach(doc => {
                    const user = doc.data();
                    if (doc.id !== currentUser.uid && !user.banned && !blockedUsers.has(doc.id)) {
                        allUsers.push({ id: doc.id, ...user });
                    }
                });
                renderSuggestions();
            });
        }

        // === عرض الطلبات الواردة ===
        function renderIncomingRequests() {
            const container = document.getElementById('incoming-container');
            if (allIncomingRequests.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-inbox"></i>
                        <p>لا توجد طلبات صداقة جديدة</p>
                    </div>
                `;
                return;
            }
            container.innerHTML = allIncomingRequests.map(req => `
                <div class="request-card">
                    <img src="${req.userData?.profileImage || 'https://i.pravatar.cc/150?u=' + req.fromUserId}" 
                         class="req-avatar" 
                         onclick="openProfile('${req.fromUserId}')">
                    <div class="req-info">
                        <div class="req-name" onclick="openProfile('${req.fromUserId}')">
                            ${req.userData?.fullName || req.fromUserName}
                        </div>
                        <div class="req-mutual">يريد إضافتك كصديق</div>
                        <div class="req-time">${formatTime(req.timestamp)}</div>
                        <div class="req-actions">
                            <button class="btn-req btn-accept" onclick="handleFriendRequest('${req.id}', '${req.fromUserId}', 'accept')">
                                <i class="fas fa-check"></i> قبول
                            </button>
                            <button class="btn-req btn-decline" onclick="handleFriendRequest('${req.id}', '${req.fromUserId}', 'reject')">
                                <i class="fas fa-times"></i> رفض
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // === عرض الطلبات المرسلة ===
        function renderSentRequests() {
            const container = document.getElementById('sent-container');
            if (allSentRequests.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-paper-plane"></i>
                        <p>لا توجد طلبات مرسلة قيد الانتظار</p>
                    </div>
                `;
                return;
            }
            container.innerHTML = allSentRequests.map(req => `
                <div class="request-card sent">
                    <img src="${req.userData?.profileImage || 'https://i.pravatar.cc/150?u=' + req.toUserId}" 
                         class="req-avatar"
                         onclick="openProfile('${req.toUserId}')">
                    <div class="req-info">
                        <div class="req-name" onclick="openProfile('${req.toUserId}')">
                            ${req.userData?.fullName || 'مستخدم'}
                        </div>
                        <div class="req-mutual">في انتظار الموافقة</div>
                        <div class="req-time">${formatTime(req.timestamp)}</div>
                        <div class="req-actions">
                            <button class="btn-req btn-cancel" onclick="cancelSentRequest('${req.id}', '${req.toUserId}')">
                                <i class="fas fa-undo"></i> سحب
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // === عرض الأصدقاء ===
        function renderFriends(list) {
            const container = document.getElementById('friends-list-container');
            if (list.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-user-friends"></i>
                        <p>لا توجد أصدقاء بعد.<br>ابدأ بإضافة أصدقاء جدد!</p>
                        <button class="btn-add" style="width:auto; padding:10px 20px;" onclick="switchTab('suggestions')">
                            استكشف المقترحات
                        </button>
                    </div>
                `;
                return;
            }
            container.innerHTML = list.map(friend => `
                <div class="friend-item" onclick="openProfile('${friend.id}')">
                    <div class="friend-left">
                        <div class="friend-avatar-wrapper">
                            <img src="${friend.profileImage || 'https://i.pravatar.cc/150?u=' + friend.username}" 
                                 class="friend-avatar">
                            <span class="status-dot"></span>
                        </div>
                        <div class="friend-info">
                            <h4>${friend.fullName || friend.username}</h4>
                            <p>${friend.country || 'متصل'}</p>
                        </div>
                    </div>
                    <div class="friend-actions">
                        <button onclick="event.stopPropagation(); startChatWith('${friend.id}', '${friend.fullName || friend.username}')" title="مراسلة">
                            <i class="fas fa-comment"></i>
                        </button>
                        <button onclick="event.stopPropagation(); showContextMenu(event, '${friend.id}')" title="المزيد">
                            <i class="fas fa-ellipsis-h"></i>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // === عرض المقترحات ===
        function renderSuggestions(searchQuery = '') {
            const container = document.getElementById('suggestions-container');
            let suggestions = allUsers.filter(u => {
                const isFriend = u.friends?.includes(currentUser.uid) || 
                               allFriends.some(f => f.id === u.id);
                const isRequested = pendingSentRequests.has(u.id);
                const isBlocked = blockedUsers.has(u.id);
                const matchesSearch = !searchQuery || 
                    u.fullName?.toLowerCase().includes(searchQuery) || 
                    u.username?.toLowerCase().includes(searchQuery);
                return !isFriend && !isRequested && !isBlocked && matchesSearch;
            }).slice(0, 8);
            
            if (suggestions.length === 0) {
                container.innerHTML = `
                    <div class="empty-state" style="grid-column: span 2;">
                        <i class="fas fa-lightbulb"></i>
                        <p>${searchQuery ? 'لا توجد نتائج للبحث' : 'لا توجد اقتراحات حالياً'}</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = suggestions.map(user => {
                const isPending = pendingSentRequests.has(user.id);
                return `
                    <div class="suggestion-card">
                        <div class="sugg-avatar-wrapper">
                            <img src="${user.profileImage || 'https://i.pravatar.cc/150?u=' + user.username}" 
                                 class="sugg-avatar"
                                 onclick="openProfile('${user.id}')">
                        </div>
                        <div class="sugg-name" onclick="openProfile('${user.id}')">
                            ${user.fullName || user.username}
                        </div>
                        <div class="sugg-job">${user.country || 'مستخدم جديد'}</div>
                        <button class="btn-add ${isPending ? 'sent' : ''}" 
                                onclick="${isPending ? `cancelSentRequestByUser('${user.id}')` : `sendFriendRequest('${user.id}', '${user.fullName || user.username}')`}">
                            ${isPending ? '<i class="fas fa-clock"></i> في الانتظار' : '<i class="fas fa-user-plus"></i> إضافة صديق'}
                        </button>
                    </div>
                `;
            }).join('');
        }

        // === معالجة طلبات الصداقة ===
        window.handleFriendRequest = async function(requestId, fromUserId, action) {
            const reqRef = doc(db, "requests", requestId);
            
            if (action === 'accept') {
                await updateDoc(reqRef, { status: 'accepted', acceptedAt: serverTimestamp() });
                
                // إضافة للأصدقاء للطرفين
                await updateDoc(doc(db, "users", currentUser.uid), {
                    friends: arrayUnion(fromUserId),
                    'stats.friendsCount': increment(1)
                });
                await updateDoc(doc(db, "users", fromUserId), {
                    friends: arrayUnion(currentUser.uid),
                    'stats.friendsCount': increment(1)
                });

                // إشعار القبول
                await addDoc(collection(db, "notifications"), {
                    type: 'friend_accepted',
                    targetUserId: fromUserId,
                    senderName: currentUser.fullName || currentUser.username,
                    senderId: currentUser.uid,
                    title: '✅ تم قبول طلب صداقتك',
                    body: `${currentUser.fullName || currentUser.username} قبل طلب الصداقة`,
                    isRead: false,
                    timestamp: serverTimestamp()
                });
                
                alert('✅ تم قبول طلب الصداقة');
            } else {
                await updateDoc(reqRef, { status: 'rejected', rejectedAt: serverTimestamp() });
                alert('تم رفض الطلب');
            }
        };

        // === إرسال طلب صداقة ===
        window.sendFriendRequest = async function(userId, userName) {
            if (pendingSentRequests.has(userId)) {
                alert('تم إرسال الطلب بالفعل');
                return;
            }
            
            await addDoc(collection(db, "requests"), {
                type: 'friend',
                fromUserId: currentUser.uid,
                fromUserName: currentUser.fullName,
                toUserId: userId,
                status: 'pending',
                timestamp: serverTimestamp()
            });
            
            // إشعار للآخر
            await addDoc(collection(db, "notifications"), {
                type: 'friend_request',
                targetUserId: userId,
                senderName: currentUser.fullName || currentUser.username,
                senderId: currentUser.uid,
                title: '📩 طلب صداقة جديد',
                body: `${currentUser.fullName || currentUser.username} يريد إضافتك كصديق`,
                isRead: false,
                timestamp: serverTimestamp()
            });
            
            pendingSentRequests.add(userId);
            renderSuggestions();
            renderSentRequests();
            alert(`✅ تم إرسال طلب صداقة إلى ${userName}`);
        };

        // === سحب طلب مرسل ===
        window.cancelSentRequest = async function(requestId, toUserId) {
            if (!confirm('هل تريد سحب طلب الصداقة؟')) return;
            
            await deleteDoc(doc(db, "requests", requestId));
            pendingSentRequests.delete(toUserId);
            renderSentRequests();
            renderSuggestions();
            alert('✅ تم سحب الطلب');
        };

        window.cancelSentRequestByUser = async function(userId) {
            const reqQuery = query(
                collection(db, "requests"),
                where("fromUserId", "==", currentUser.uid),
                where("toUserId", "==", userId),
                where("type", "==", "friend"),
                where("status", "==", "pending")
            );
            const snapshot = await getDoc(reqQuery);
            if (!snapshot.empty) {
                await deleteDoc(doc(db, "requests", snapshot.docs[0].id));
                pendingSentRequests.delete(userId);
                renderSentRequests();
                renderSuggestions();
                alert('✅ تم سحب الطلب');
            }
        };

        // === إزالة صديق ===
        window.removeFriend = async function(friendId) {
            if (!confirm('هل تريد إزالة هذا الصديق؟')) return;
            
            await updateDoc(doc(db, "users", currentUser.uid), {
                friends: arrayRemove(friendId)
            });
            await updateDoc(doc(db, "users", friendId), {
                friends: arrayRemove(currentUser.uid)
            });
            
            // إشعار
            await addDoc(collection(db, "notifications"), {
                type: 'friend_removed',
                targetUserId: friendId,
                senderName: currentUser.fullName || currentUser.username,
                senderId: currentUser.uid,
                title: '👋 تمت إزالة الصداقة',
                body: `${currentUser.fullName || currentUser.username} أزالك من قائمة الأصدقاء`,
                isRead: false,
                timestamp: serverTimestamp()
            });
            
            alert('✅ تمت إزالة الصديق');
            hideContextMenu();
        };

        // === حظر مستخدم ===
        window.blockUser = async function(userId) {
            if (!confirm('هل تريد حظر هذا المستخدم؟ لن يتمكن من مراسلتك أو رؤيتك.')) return;
            
            await updateDoc(doc(db, "users", currentUser.uid), {
                blocked: arrayUnion(userId),
                friends: arrayRemove(userId)
            });
            await updateDoc(doc(db, "users", userId), {
                friends: arrayRemove(currentUser.uid)
            });
            
            blockedUsers.add(userId);
            allFriends = allFriends.filter(f => f.id !== userId);
            renderFriends(allFriends);
            renderSuggestions();
            
            alert('✅ تم حظر المستخدم');
            hideContextMenu();
        };

        // === قائمة السياق ===
        window.showContextMenu = function(event, userId) {
            event.stopPropagation();
            currentContextMenuUserId = userId;
            const menu = document.getElementById('contextMenu');
            const rect = event.target.getBoundingClientRect();
            
            menu.style.top = (rect.bottom + 5) + 'px';
            menu.style.right = rect.right + 'px';
            menu.style.display = 'block';
            
            // تحديث خيارات القائمة
            document.getElementById('ctx-message').onclick = () => {
                startChatWith(userId);
                hideContextMenu();
            };
            document.getElementById('ctx-profile').onclick = () => {
                openProfile(userId);
                hideContextMenu();
            };
            document.getElementById('ctx-block').onclick = () => blockUser(userId);
            document.getElementById('ctx-remove').onclick = () => removeFriend(userId);
        };

        window.hideContextMenu = function() {
            document.getElementById('contextMenu').style.display = 'none';
            currentContextMenuUserId = null;
        };

        // إغلاق القائمة عند النقر خارجها
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.context-menu') && !e.target.closest('[onclick*="showContextMenu"]')) {
                hideContextMenu();
            }
        });

        // === البروفايل ===
        const modal = document.getElementById('profileModal');
        let currentProfileUserId = null;

        window.openProfile = async function(userId) {
            currentProfileUserId = userId;
            try {
                const userRef = doc(db, "users", userId);
                const userSnap = await getDoc(userRef);
                if (userSnap.exists()) {
                    const user = userSnap.data();
                    document.getElementById('modal-name').textContent = user.fullName || user.username;
                    document.getElementById('modal-username').textContent = user.username ? '@' + user.username : '';
                    document.getElementById('modal-img').src = user.profileImage || 'https://i.pravatar.cc/150';
                    document.getElementById('modal-bio').textContent = user.bio || 'لا توجد نبذة';
                    document.getElementById('modal-posts').textContent = user.stats?.postsCount || 0;
                    document.getElementById('modal-followers').textContent = user.stats?.followersCount || 0;
                    document.getElementById('modal-following').textContent = user.stats?.friendsCount || 0;
                    
                    // زر المراسلة
                    document.getElementById('modal-message-btn').onclick = () => {
                        startChatWith(userId, user.fullName || user.username);
                    };
                    
                    // زر الإجراء (إضافة/صديق/محظور)
                    const actionBtn = document.getElementById('modal-action-btn');
                    const isFriend = user.friends?.includes(currentUser.uid);
                    const isPending = pendingSentRequests.has(userId);
                    
                    if (blockedUsers.has(userId)) {
                        actionBtn.textContent = 'محظور';
                        actionBtn.className = 'btn-profile btn-secondary';
                        actionBtn.disabled = true;
                    } else if (isFriend) {
                        actionBtn.textContent = 'صديق ✓';
                        actionBtn.className = 'btn-profile btn-secondary';
                        actionBtn.onclick = () => removeFriend(userId);
                    } else if (isPending) {
                        actionBtn.textContent = 'تم الإرسال';
                        actionBtn.className = 'btn-profile btn-secondary';
                        actionBtn.onclick = () => cancelSentRequestByUser(userId);
                    } else {
                        actionBtn.textContent = 'إضافة صديق';
                        actionBtn.className = 'btn-profile btn-primary';
                        actionBtn.onclick = () => sendFriendRequest(userId, user.fullName || user.username);
                    }
                    
                    // النشاطات
                    document.getElementById('modal-activities').innerHTML = `
                        <p>• آخر دخول: ${user.lastActive ? 'منذ قليل' : 'غير معروف'}</p>
                        <p>• الدولة: ${user.country || 'غير محدد'}</p>
                        <p>• عضو منذ: ${user.createdAt ? 'فترة' : 'غير معروف'}</p>
                    `;
                    
                    modal.classList.add('show');
                    document.body.classList.add('scroll-locked');
                }
            } catch (error) {
                console.error('Error loading profile:', error);
            }
        };

        window.closeProfile = function() {
            modal.classList.remove('show');
            document.body.classList.remove('scroll-locked');
        };

        modal.addEventListener('click', (e) => {
            if (e.target === modal) closeProfile();
        });

        // === الدردشة ===
        window.startChatWith = function(userId, userName) {
            window.location.href = `chat.html?targetId=${userId}&targetName=${encodeURIComponent(userName)}`;
        };

        // === تبديل التبويبات ===
        window.switchTab = function(tabName) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelector(`[data-tab="${tabName}"]`).classList.add('active');
            document.getElementById(tabName).classList.add('active');
        };

        // === تنسيق الوقت ===
        function formatTime(timestamp) {
            if (!timestamp) return '';
            const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
            const now = new Date();
            const diff = now - date;
            if (diff < 60000) return 'الآن';
            if (diff < 3600000) return Math.floor(diff / 60000) + ' دقيقة';
            if (diff < 86400000) return Math.floor(diff / 3600000) + ' ساعة';
            return date.toLocaleDateString('ar-SA');
        }

        // === الوضع الليلي ===
        document.getElementById('theme-toggle').addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            const icon = document.querySelector('#theme-toggle i');
            icon.classList.toggle('fa-moon');
            icon.classList.toggle('fa-sun');
        });

        // === التهيئة ===
        document.addEventListener('DOMContentLoaded', async () => {
            await loadBlockedData();
            startListeners();
            console.log('🚀 === FRIENDS PAGE READY ===');
        });
    </script>
</body>
</html>
