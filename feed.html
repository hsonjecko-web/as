<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>المنشورات</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
--primary-color: #6366f1;
--primary-gradient: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
--bg-color: #f8fafc;
--card-bg: #ffffff;
--text-main: #1e293b;
--text-secondary: #64748b;
--border-color: #e2e8f0;
--input-bg: #f1f5f9;
--shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
--nav-height: 70px;
--like-color: #ef4444;
--save-color: #f59e0b;
--danger-color: #dc2626;
--success-color: #10b981;
--warning-color: #f59e0b;
}
/* ========================================
   📱 تحسينات التصميم المتجاوب لكل الشاشات
   ======================================== */

/* === للهواتف الصغيرة جداً (320px - 360px) === */
@media (max-width: 360px) {
    :root {
        --nav-height: 60px; /* تصغير الفوتر */
    }
    
    .bottom-nav {
        height: var(--nav-height);
        padding: 5px 0;
    }
    
    .nav-item {
        font-size: 0.6rem;
        gap: 3px;
    }
    
    .nav-item i {
        font-size: 1.1rem;
    }
    
    header {
        padding: 10px 15px;
    }
    
    .header-title {
        font-size: 1.1rem;
    }
    
    .icon-btn {
        width: 36px;
        height: 36px;
        font-size: 1rem;
    }
    
    .user-avatar-small {
        width: 32px;
        height: 32px;
    }
    
    .username {
        font-size: 0.9rem;
    }
    
    .notification-badge {
        min-width: 16px;
        height: 16px;
        font-size: 0.6rem;
        top: 6px;
        right: 6px;
    }
}

/* === للهواتف المتوسطة (361px - 414px) === */
@media (min-width: 361px) and (max-width: 414px) {
    :root {
        --nav-height: 65px;
    }
    
    .nav-item {
        font-size: 0.65rem;
    }
    
    header {
        padding: 12px 18px;
    }
}

/* === للهواتف الكبيرة والتابلت الصغير (415px - 768px) === */
@media (min-width: 415px) and (max-width: 768px) {
    .mobile-container {
        max-width: 100%;
        border-radius: 0;
        margin: 0;
    }
}

/* === للشاشات الكبيرة (تابلت +) === */
@media (min-width: 769px) {
    .mobile-container {
        max-width: 450px;
        margin: 20px auto;
        border-radius: 30px;
        min-height: 90vh;
        border: 1px solid var(--border-color);
    }
    
    .bottom-nav {
        border-radius: 0 0 30px 30px;
        max-width: 450px;
        left: 50%;
        transform: translateX(-50%);
    }
}

/* === دعم الشاشات ذات الحواف (نوتش، ثقب الكاميرا) === */
@supports (padding-top: env(safe-area-inset-top)) {
    header {
        padding-top: calc(15px + env(safe-area-inset-top));
    }
    
    .bottom-nav {
        padding-bottom: env(safe-area-inset-bottom);
        height: calc(var(--nav-height) + env(safe-area-inset-bottom));
    }
    
    body {
        padding-bottom: calc(var(--nav-height) + 20px + env(safe-area-inset-bottom));
    }
}

/* === تحسين اللمس للأزرار (للموبايل) === */
@media (hover: none) and (pointer: coarse) {
    .icon-btn,
    .nav-item,
    .action-btn,
    .btn-profile,
    .btn-submit,
    .filter-chip,
    .join-btn,
    .add-friend-btn {
        min-height: 44px; /* حد أدنى لمنطقة اللمس */
        min-width: 44px;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    
    .nav-item {
        padding: 8px 4px;
    }
}

/* === منع التكبير باللمس المزدوج (لتجربة أفضل) === */
* {
    touch-action: manipulation;
}

/* === تحسين التمرير للموبايل === */
body {
    overscroll-behavior-y: contain; /* منع السحب للتحديث في التطبيق */
}

/* === تحسين ظهور لوحة المفاتيح === */
body.keyboard-open .bottom-nav {
    transform: translateY(100%); /* إخفاء الفوتر عند ظهور الكيبورد */
    transition: transform 0.2s ease;
}
body.dark-mode {
--bg-color: #0f172a;
--card-bg: #1e293b;
--text-main: #f1f5f9;
--text-secondary: #94a3b8;
--border-color: #334155;
--input-bg: #334155;
--shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
}
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; -webkit-tap-highlight-color: transparent; }
body { background-color: var(--bg-color); color: var(--text-main); padding-bottom: calc(var(--nav-height) + 20px); transition: background-color 0.3s ease; }
body.scroll-locked { overflow: hidden; }
body.keyboard-open { padding-bottom: calc(var(--nav-height) + 350px); }
header {
position: sticky; top: 0; z-index: 100;
background: rgba(255, 255, 255, 0.9);
backdrop-filter: blur(20px);
padding: 15px 20px;
display: flex; justify-content: space-between; align-items: center;
box-shadow: var(--shadow);
border-bottom: 1px solid var(--border-color);
}
body.dark-mode header { background: rgba(30, 41, 59, 0.9); }
.header-title {
font-size: 1.4rem; font-weight: 800;
background: var(--primary-gradient);
-webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.header-actions button {
background: var(--input-bg); border: none;
width: 40px; height: 40px; border-radius: 12px;
color: var(--text-main); cursor: pointer;
transition: all 0.3s; margin-left: 10px;
}
.header-actions button:hover { background: var(--primary-color); color: white; }
/* شريط البحث */
.search-bar {
padding: 15px 20px; background: var(--card-bg);
border-bottom: 1px solid var(--border-color);
display: none;
}
.search-bar.show { display: block; }
.search-input-wrapper { position: relative; }
.search-input {
width: 100%; padding: 12px 45px 12px 15px;
background: var(--input-bg); border: none;
border-radius: 14px; font-size: 0.95rem;
color: var(--text-main); outline: none;
}
.search-input:focus { background: var(--card-bg); box-shadow: 0 0 0 2px var(--primary-color); }
.search-icon {
position: absolute; right: 15px; top: 50%;
transform: translateY(-50%); color: var(--text-secondary);
}
.filters-scroll {
display: flex; overflow-x: auto; padding: 15px 20px; gap: 12px;
scrollbar-width: none; border-bottom: 1px solid var(--border-color);
}
.filters-scroll::-webkit-scrollbar { display: none; }
.filter-chip {
padding: 8px 20px; background-color: var(--card-bg);
border: 1px solid var(--border-color); border-radius: 20px;
font-size: 0.9rem; font-weight: 600; color: var(--text-secondary);
white-space: nowrap; cursor: pointer; transition: all 0.3s;
}
.filter-chip.active {
background: var(--primary-gradient); color: white;
border-color: transparent; box-shadow: 0 4px 10px rgba(99, 102, 241, 0.4);
}
.post-card {
background-color: var(--card-bg); margin: 15px 20px;
border-radius: 20px; padding: 20px;
box-shadow: var(--shadow); border: 1px solid var(--border-color);
transition: transform 0.2s; position: relative;
}
.post-card:hover { transform: translateY(-2px); }
.post-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
.post-user { display: flex; align-items: center; gap: 12px; cursor: pointer; flex: 1; }
.post-avatar {
width: 45px; height: 45px; border-radius: 14px;
object-fit: cover; border: 2px solid var(--primary-color);
}
.post-user-info h4 { font-size: 1rem; font-weight: 700; color: var(--text-main); margin-bottom: 2px; }
.post-user-info span { font-size: 0.75rem; color: var(--text-secondary); }
.post-options { color: var(--text-secondary); cursor: pointer; padding: 5px; position: relative; }
.post-content { font-size: 1.05rem; line-height: 1.7; color: var(--text-main); margin-bottom: 20px; white-space: pre-wrap; }

/* === صور المنشورات === */
.post-image-container {
width: 100%; margin-bottom: 15px;
border-radius: 12px; overflow: hidden;
border: 1px solid var(--border-color);
position: relative;
}
.post-image {
width: 100%; height: auto; display: block;
object-fit: cover; max-height: 500px;
cursor: pointer; transition: transform 0.3s;
}
.post-image:hover { transform: scale(1.02); }
.post-image-remove {
position: absolute; top: 10px; left: 10px;
width: 30px; height: 30px; border-radius: 50%;
background: rgba(220, 38, 38, 0.9); color: white;
border: none; cursor: pointer; display: flex;
align-items: center; justify-content: center;
font-size: 0.9rem; z-index: 5;
}
.post-stats {
display: flex; justify-content: space-between;
color: var(--text-secondary); font-size: 0.85rem;
margin-bottom: 15px; padding-bottom: 15px;
border-bottom: 1px solid var(--border-color);
}
.post-actions { display: flex; justify-content: space-between; padding-top: 5px; flex-wrap: wrap; gap: 10px; }
.action-btn {
background: none; border: none; color: var(--text-secondary);
font-size: 1.3rem; cursor: pointer;
display: flex; flex-direction: column; align-items: center; gap: 5px;
transition: all 0.3s; position: relative;
}
.action-btn span { font-size: 0.75rem; font-weight: 500; }
.action-btn:hover { color: var(--primary-color); transform: translateY(-2px); }
.action-btn.liked { color: var(--like-color); }
.action-btn.liked i { animation: pop 0.3s ease; }
.action-btn.saved { color: var(--save-color); }
@keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }

/* === الفوتر === */
.bottom-nav {
position: fixed; bottom: 0; left: 0; width: 100%;
height: var(--nav-height); background: rgba(255, 255, 255, 0.95);
backdrop-filter: blur(20px); display: flex;
justify-content: space-around; align-items: center;
border-top: 1px solid var(--border-color);
box-shadow: 0 -4px 20px rgba(0,0,0,0.08); z-index: 1000;
}
body.dark-mode .bottom-nav { background: rgba(30, 41, 59, 0.95); }
.nav-item {
display: flex; flex-direction: column; align-items: center;
text-decoration: none; color: var(--text-secondary);
font-size: 0.7rem; gap: 6px; transition: all 0.3s;
}
.nav-item i { font-size: 1.3rem; }
.nav-item.active { color: var(--primary-color); }
.nav-item.active i { transform: translateY(-3px); }

/* === زر الكتابة العائم === */
.fab-write {
position: fixed; bottom: 90px; left: 20px;
width: 60px; height: 60px; border-radius: 50%;
background: var(--primary-gradient); color: white;
border: none; box-shadow: 0 8px 20px rgba(99, 102, 241, 0.4);
display: flex; align-items: center; justify-content: center;
font-size: 1.5rem; cursor: pointer; z-index: 900;
transition: transform 0.3s;
}
.fab-write:hover { transform: scale(1.1) rotate(90deg); }

/* === المودال === */
.modal-overlay {
position: fixed; top: 0; left: 0; width: 100%; height: 100%;
background: rgba(0,0,0,0.6); backdrop-filter: blur(5px);
z-index: 2000; display: none; justify-content: center; align-items: flex-end;
}
.modal-overlay.show { display: flex; }
.modal-content {
background: var(--card-bg); width: 100%; max-width: 500px;
border-radius: 25px 25px 0 0; padding: 25px;
animation: slideUp 0.3s; max-height: 85vh; overflow-y: auto;
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.modal-title { font-size: 1.2rem; font-weight: 800; }
.close-modal {
position: absolute; top: 20px; left: 20px;
width: 35px; height: 35px; border-radius: 50%;
background: var(--input-bg); border: none;
color: var(--text-main); cursor: pointer; z-index: 10;
}

/* === حقول النموذج === */
.form-input {
width: 100%; padding: 12px; background: var(--input-bg);
border: 1px solid var(--border-color); border-radius: 12px;
color: var(--text-main); outline: none; margin-bottom: 15px;
}
.form-input:focus { border-color: var(--primary-color); }
.form-textarea { min-height: 120px; resize: vertical; }

/* === زر رفع الصورة === */
.image-upload-wrapper {
margin-bottom: 15px;
}
.image-upload-btn {
display: flex; align-items: center; gap: 10px;
padding: 12px; background: var(--input-bg);
border: 2px dashed var(--border-color); border-radius: 12px;
color: var(--text-secondary); cursor: pointer;
transition: all 0.3s; width: 100%;
}
.image-upload-btn:hover {
border-color: var(--primary-color);
color: var(--primary-color);
background: rgba(99, 102, 241, 0.05);
}
.image-upload-btn i { font-size: 1.2rem; }
.image-upload-input { display: none; }

/* === معاينة الصورة === */
.image-preview-container {
margin-top: 15px; position: relative;
}
.image-preview {
width: 100%; max-height: 300px;
border-radius: 12px; object-fit: cover;
border: 1px solid var(--border-color);
}
.image-preview-remove {
position: absolute; top: 10px; left: 10px;
width: 30px; height: 30px; border-radius: 50%;
background: rgba(220, 38, 38, 0.9); color: white;
border: none; cursor: pointer; display: flex;
align-items: center; justify-content: center;
font-size: 0.9rem;
}

/* === زر النشر === */
.btn-submit {
width: 100%; padding: 14px; background: var(--primary-gradient);
color: white; border: none; border-radius: 14px;
font-weight: 700; cursor: pointer;
}
.btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }

/* === التعليقات === */
.comment-item {
display: flex; gap: 10px; margin-bottom: 12px;
padding: 10px; border-radius: 12px;
background: var(--card-bg);
}
.nested-comment {
margin-right: 25px; border-right: 2px solid var(--border-color);
padding-right: 15px; margin-top: 8px; background: var(--input-bg);
}
.comment-avatar {
width: 35px; height: 35px; border-radius: 50%;
object-fit: cover; flex-shrink: 0; cursor: pointer;
}
.comment-content { flex: 1; min-width: 0; }
.comment-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; flex-wrap: wrap; gap: 5px; }
.comment-author { font-weight: 600; font-size: 0.85rem; cursor: pointer; }
.comment-author:hover { color: var(--primary-color); }
.comment-time { font-size: 0.7rem; color: var(--text-secondary); }
.comment-text { font-size: 0.9rem; color: var(--text-main); margin-bottom: 8px; word-wrap: break-word; }
.comment-actions { display: flex; gap: 10px; font-size: 0.75rem; flex-wrap: wrap; }
.comment-action {
background: none; border: none; cursor: pointer;
padding: 4px 8px; border-radius: 4px; color: var(--text-secondary);
transition: color 0.2s; display: inline-flex; align-items: center; gap: 4px;
}
.comment-action:hover { color: var(--primary-color); background: rgba(99,102,241,0.1); }
.comment-action.liked { color: var(--like-color); }
.comment-action.delete:hover { color: var(--danger-color); background: rgba(220,38,38,0.1); }
.reply-input-wrapper {
display: flex; gap: 8px; margin-top: 10px;
width: 100%;
}
.reply-input {
flex: 1; padding: 8px 12px; background: var(--input-bg);
border: none; border-radius: 15px; font-size: 0.85rem;
min-width: 0;
}
.reply-actions { display: flex; gap: 8px; flex-shrink: 0; }
.reply-send {
width: 35px; height: 35px; border-radius: 50%;
background: var(--primary-gradient); color: white;
border: none; cursor: pointer; font-size: 0.9rem;
display: flex; align-items: center; justify-content: center;
}
.reply-cancel {
width: 35px; height: 35px; border-radius: 50%;
background: var(--input-bg); color: var(--text-secondary);
border: none; cursor: pointer; font-size: 0.9rem;
display: flex; align-items: center; justify-content: center;
}
.comments-modal .modal-content { max-height: 90vh; }
.comments-title { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
.comment-count {
background: var(--primary-gradient); color: white;
padding: 4px 12px; border-radius: 20px;
font-size: 0.8rem; font-weight: 600;
}
.comment-input-wrapper {
display: flex; gap: 10px; margin-top: 15px;
padding-top: 15px; border-top: 1px solid var(--border-color);
}
.comment-input {
flex: 1; padding: 12px; background: var(--input-bg);
border: none; border-radius: 20px; color: var(--text-main); outline: none;
min-width: 0;
}
.comment-send {
width: 40px; height: 40px; border-radius: 50%;
background: var(--primary-gradient); color: white;
border: none; cursor: pointer;
display: flex; align-items: center; justify-content: center;
flex-shrink: 0;
}

/* === المشاركة === */
.share-options { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; padding: 20px 0; }
.share-option { display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; }
.share-option i {
width: 50px; height: 50px; border-radius: 14px;
background: var(--input-bg); display: flex;
align-items: center; justify-content: center;
font-size: 1.3rem; transition: 0.3s;
}
.share-option:hover i { background: var(--primary-gradient); color: white; transform: translateY(-3px); }
.share-option span { font-size: 0.8rem; color: var(--text-secondary); }
.copy-link {
margin-top: 15px; padding: 10px; background: var(--input-bg);
border-radius: 10px; display: flex; align-items: center; gap: 10px;
}
.copy-link input { flex: 1; background: none; border: none; color: var(--text-main); outline: none; }
.copy-link button {
background: var(--primary-color); color: white;
border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer;
}

/* === البروفايل === */
.profile-modal-overlay {
position: fixed; top: 0; left: 0; width: 100%; height: 100%;
background: rgba(0,0,0,0.6); backdrop-filter: blur(5px);
z-index: 2000; display: none; justify-content: center; align-items: flex-end;
}
.profile-modal-overlay.show { display: flex; }
.profile-modal {
background: var(--card-bg); width: 100%; max-width: 500px;
height: 85vh; border-radius: 30px 30px 0 0;
padding: 25px; overflow-y: auto;
animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1);
position: relative;
}
.profile-header { text-align: center; margin-bottom: 25px; padding-top: 20px; }
.profile-avatar-large {
width: 100px; height: 100px; border-radius: 25px;
object-fit: cover; border: 4px solid var(--primary-color);
margin-bottom: 15px; box-shadow: 0 8px 20px rgba(99, 102, 241, 0.3);
}
.profile-name { font-size: 1.4rem; font-weight: 800; margin-bottom: 5px; }
.profile-username { font-size: 0.9rem; color: var(--primary-color); font-weight: 600; margin-bottom: 10px; direction: ltr; }
.profile-bio { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 20px; }
.profile-stats-row { display: flex; justify-content: center; gap: 30px; margin-bottom: 25px; }
.stat-item { text-align: center; }
.stat-item b { display: block; font-size: 1.2rem; color: var(--text-main); }
.stat-item span { font-size: 0.8rem; color: var(--text-secondary); }
.profile-posts-title {
font-size: 1.1rem; font-weight: 700; margin-bottom: 15px;
border-right: 4px solid var(--primary-color); padding-right: 10px;
}

/* === حالات التحميل === */
.loading, .empty-state {
text-align: center; padding: 40px; color: var(--text-secondary);
}
.empty-state i { font-size: 3rem; margin-bottom: 15px; opacity: 0.3; }
.empty-state p { font-size: 0.9rem; margin-bottom: 20px; }

/* === مؤشر التحديث === */
.refresh-indicator {
position: fixed; top: 80px; left: 50%;
transform: translateX(-50%); background: var(--success-color);
color: white; padding: 8px 20px; border-radius: 20px;
font-size: 0.85rem; font-weight: 600; z-index: 1500;
display: none; animation: slideDown 0.3s ease;
box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);
}
.refresh-indicator.show { display: flex; align-items: center; gap: 8px; }
@keyframes slideDown {
from { transform: translateX(-50%) translateY(-20px); opacity: 0; }
to { transform: translateX(-50%) translateY(0); opacity: 1; }
}

/* === زر تحميل المزيد === */
.load-more-container { text-align: center; padding: 20px; }
.load-more-btn {
background: var(--primary-gradient); color: white;
border: none; padding: 12px 40px; border-radius: 12px;
font-weight: 600; cursor: pointer; transition: all 0.3s;
}
.load-more-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4); }
.load-more-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

/* === شارة إعادة النشر === */
.repost-badge {
background: rgba(99, 102, 241, 0.1); color: var(--primary-color);
padding: 8px 12px; border-radius: 10px; font-size: 0.8rem;
margin-bottom: 10px; display: inline-flex; align-items: center; gap: 6px;
}
.repost-original {
font-size: 0.8rem; color: var(--text-secondary);
margin: 10px 0; padding: 10px; background: var(--input-bg);
border-radius: 10px; cursor: pointer;
}
.repost-original:hover { background: var(--border-color); }

/* === مؤشر تحميل الصورة === */
.image-upload-loading {
display: none; align-items: center; gap: 8px;
padding: 10px; background: rgba(99,102,241,0.1);
border-radius: 10px; color: var(--primary-color);
font-size: 0.85rem; margin-top: 10px;
}
.image-upload-loading.show { display: flex; }

/* === استجابة للشاشات الصغيرة === */
@media (max-width: 480px) {
.post-actions { gap: 15px; }

.reply-input-wrapper { flex-wrap: wrap; }

.reply-actions { width: 100%; justify-content: flex-end; }
}

</head>
<body>
<div class="refresh-indicator" id="refresh-indicator">
<i class="fas fa-sync-alt fa-spin"></i>
<span>جاري التحديث...</span>
</div>

<header>
<div class="header-title">المنشورات</div>
<div class="header-actions">
<button onclick="toggleSearch()" title="بحث"><i class="fas fa-search"></i></button>
<button onclick="refreshPosts()" title="تحديث"><i class="fas fa-sync-alt"></i></button>
</div>
</header>

<!-- شريط البحث -->
<div class="search-bar" id="search-bar">
<div class="search-input-wrapper">
<input type="text" class="search-input" id="feed-search" placeholder="بحث عن اسم المستخدم..." oninput="filterPostsBySearch()">
<i class="fas fa-search search-icon"></i>
</div>
</div>

<div class="filters-scroll">
<div class="filter-chip active" onclick="filterPosts('all', this)">الكل</div>
<div class="filter-chip" onclick="filterPosts('following', this)">متابعون</div>
<div class="filter-chip" onclick="filterPosts('popular', this)">الأكثر تفاعلاً</div>
</div>

<main id="posts-container">
<div class="loading"><i class="fas fa-spinner fa-spin"></i> جاري التحميل...</div>
</main>

<!-- زر تحميل المزيد -->
<div class="load-more-container" id="load-more-container" style="display: none;">
<button class="load-more-btn" id="load-more-btn" onclick="loadMorePosts()">
<i class="fas fa-plus"></i> تحميل المزيد
</button>
</div>

<button class="fab-write" onclick="openPostModal()"><i class="fas fa-pen"></i></button>

<nav class="bottom-nav">
<a href="home.html" class="nav-item"><i class="fas fa-home"></i><span>الرئيسية</span></a>
<a href="feed.html" class="nav-item active"><i class="fas fa-newspaper"></i><span>المنشورات</span></a>
<a href="chat.html" class="nav-item"><i class="fas fa-comment-dots"></i><span>الدردشة</span></a>
<a href="friends.html" class="nav-item"><i class="fas fa-user-friends"></i><span>المتابعون</span></a>
<a href="profile.html" class="nav-item"><i class="fas fa-user"></i><span>حسابي</span></a>
</nav>

<!-- مودال إنشاء منشور -->
<div class="modal-overlay" id="postModal">
<div class="modal-content">
<div class="modal-header">
<h3 class="modal-title">نشر منشور جديد</h3>
<button class="close-modal" onclick="closePostModal()">&times;</button>
</div>

<!-- حقل النص -->
<textarea class="form-input form-textarea" id="post-content" placeholder="بماذا تفكر؟..." maxlength="500"></textarea>
<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
<span style="font-size: 0.8rem; color: var(--text-secondary);" id="char-count">0/500</span>
</div>

<!-- ✅ زر رفع الصورة -->
<div class="image-upload-wrapper">
<label class="image-upload-btn" id="image-upload-label">
<i class="fas fa-image"></i>
<span id="image-upload-text">إضافة صورة للمنشور</span>
<input type="file" class="image-upload-input" id="image-upload-input" accept="image/*">
</label>
<div class="image-upload-loading" id="image-upload-loading">
<i class="fas fa-spinner fa-spin"></i>
<span>جاري معالجة الصورة...</span>
</div>
</div>

<!-- معاينة الصورة -->
<div class="image-preview-container" id="image-preview-container" style="display: none;">
<img src="" alt="معاينة" class="image-preview" id="image-preview">
<button class="image-preview-remove" onclick="removeSelectedImage()"><i class="fas fa-times"></i></button>
</div>

<button class="btn-submit" id="post-submit" onclick="createPost()">نشر <i class="fas fa-paper-plane"></i></button>
</div>
</div>

<!-- مودال البروفايل -->
<div class="profile-modal-overlay" id="profileModal">
<div class="profile-modal">
<button class="close-modal" onclick="closeProfile()"><i class="fas fa-times"></i></button>
<div class="profile-header">
<img src="" alt="Profile" class="profile-avatar-large" id="modal-img">
<h2 class="profile-name" id="modal-name">اسم المستخدم</h2>
<p class="profile-username" id="modal-username">@username</p>
<p class="profile-bio" id="modal-bio">نبذة المستخدم</p>
<div class="profile-stats-row">
<div class="stat-item"><b id="modal-posts">0</b><span>منشور</span></div>
<div class="stat-item"><b id="modal-followers">0</b><span>متابع</span></div>
<div class="stat-item"><b id="modal-following">0</b><span>يتابع</span></div>
</div>
<button class="btn-submit" id="modal-action-btn" onclick="handleProfileAction()">متابعة</button>
</div>
<h3 class="profile-posts-title">منشورات المستخدم</h3>
<div id="modal-posts-list"></div>
</div>
</div>

<!-- مودال المشاركة -->
<div class="modal-overlay" id="shareModal">
<div class="modal-content">
<div class="modal-header">
<h3 class="modal-title">مشاركة المنشور</h3>
<button class="close-modal" onclick="closeModal('shareModal')">&times;</button>
</div>
<div class="share-options">
<div class="share-option" onclick="repostToProfile()"><i class="fas fa-retweet" style="color: var(--warning-color);"></i><span>إعادة نشر</span></div>
<div class="share-option" onclick="shareTo('whatsapp')"><i class="fab fa-whatsapp" style="color: #25D366;"></i><span>واتساب</span></div>
<div class="share-option" onclick="shareTo('copy')"><i class="fas fa-link" style="color: var(--primary-color);"></i><span>نسخ الرابط</span></div>
</div>
<div class="copy-link">
<input type="text" id="share-link" readonly value="">
<button onclick="copyLink()"><i class="fas fa-copy"></i> نسخ</button>
</div>
</div>
</div>

<!-- مودال التعليقات -->
<div class="modal-overlay" id="commentsModal">
<div class="modal-content comments-modal">
<div class="modal-header">
<div class="comments-title">
<h3 class="modal-title" id="commentsTitle">التعليقات</h3>
<span class="comment-count" id="commentsCount">0</span>
</div>
<button class="close-modal" onclick="closeCommentsModal()">إغلاق</button>
</div>
<div id="fullCommentsList"></div>
<div class="comment-input-wrapper">
<input type="text" class="comment-input" id="main-comment-input" placeholder="اكتب تعليقاً..." onkeypress="handleMainCommentKey(event)">
<button class="comment-send" onclick="addMainComment()"><i class="fas fa-paper-plane"></i></button>
</div>
</div>
</div>

<!-- مودال عرض الصورة -->
<div class="modal-overlay" id="imageModal">
<div class="modal-content" style="padding: 15px; text-align: center;">
<button class="close-modal" onclick="closeModal('imageModal')" style="position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.5); color: white;">&times;</button>
<img src="" id="modal-image-full" style="max-width: 100%; max-height: 80vh; border-radius: 12px;">
</div>
</div>

<script type="module">
import {
db, collection, query, onSnapshot, doc,
getDoc, getDocs, updateDoc, addDoc, arrayUnion, arrayRemove,
serverTimestamp, increment, where, deleteDoc, orderBy, limit
} from './firebase-config.js';

const currentUser = JSON.parse(localStorage.getItem('currentUser'));
if (!currentUser || !currentUser.isLoggedIn) {
window.location.href = 'index.html';
}

let allPosts = [];
let allUsers = {};
let currentFilter = 'all';
let currentSharePostId = null;
let currentCommentsPostId = null;
let currentPostForComments = null;
let commentsListeners = new Map();
let myFollowing = new Set();
let cacheVersion = 1;

// === للتحميل التدريجي ===
let postsLimit = 10;
let hasMorePosts = true;
let isLoadingMore = false;

// === متغيرات الصورة ===
let selectedImageBase64 = null;

// === تحميل من الذاكرة المحلية ===
function loadFromCache() {
try {
const cached = localStorage.getItem('feedCache_v' + cacheVersion);
if (cached) {
const data = JSON.parse(cached);
if (Date.now() - data.timestamp < 300000) {
allPosts = data.posts || [];
allUsers = data.users || {};
myFollowing = new Set(data.following || []);
return true;
}
}
} catch (e) { console.error('Cache error:', e); }
return false;
}

// === حفظ في الذاكرة المحلية ===
function saveToCache() {
try {
localStorage.setItem('feedCache_v' + cacheVersion, JSON.stringify({
posts: allPosts, users: allUsers,
following: Array.from(myFollowing), timestamp: Date.now()
}));
} catch (e) { console.error('Save cache error:', e); }
}

// === تحميل بيانات المستخدم ===
async function loadUserData() {
try {
const userRef = doc(db, "users", currentUser.uid);
const userSnap = await getDoc(userRef);
if (userSnap.exists()) {
const userData = userSnap.data();
myFollowing = new Set(userData.following || []);
}
} catch (error) { console.error('Error loading user:', error); }
}

// === تحميل المنشورات ===
function startPostsListener() {
const postsQuery = query(collection(db, "posts"), orderBy("timestamp", "desc"));
onSnapshot(postsQuery, async (snapshot) => {
showRefreshIndicator();
allPosts = [];
for (const docSnap of snapshot.docs) {
const postData = { id: docSnap.id, ...docSnap.data() };
if (!allUsers[postData.userId]) {
try {
const userSnap = await getDoc(doc(db, "users", postData.userId));
if (userSnap.exists()) allUsers[postData.userId] = userSnap.data();
} catch (e) { console.error('Error loading user:', postData.userId); }
}
allPosts.push(postData);
}
allPosts.sort((a, b) => {
const timeA = a.timestamp?.toDate?.() || a.timestamp || 0;
const timeB = b.timestamp?.toDate?.() || b.timestamp || 0;
return new Date(timeB) - new Date(timeA);
});
hasMorePosts = allPosts.length > postsLimit;
renderPosts();
updateLoadMoreButton();
hideRefreshIndicator();
saveToCache();
}, (error) => {
console.error('Error loading posts:', error);
if (!loadFromCache()) {
document.getElementById('posts-container').innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>خطأ في التحميل</p></div>';
}
});
}

// === عرض المنشورات ===
function renderPosts() {
const container = document.getElementById('posts-container');
let postsToShow = [...allPosts];
if (currentFilter === 'following') postsToShow = postsToShow.filter(post => myFollowing.has(post.userId));
const searchQuery = document.getElementById('feed-search')?.value.toLowerCase() || '';
if (searchQuery) {
postsToShow = postsToShow.filter(post => {
const user = allUsers[post.userId];
const userName = (user?.fullName || user?.username || '').toLowerCase();
return userName.includes(searchQuery);
});
}
if (currentFilter === 'popular') postsToShow.sort((a, b) => (b.likesCount || 0) - (a.likesCount || 0));
const displayPosts = postsToShow.slice(0, postsLimit);
if (displayPosts.length === 0) {
container.innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i><p>لا توجد منشورات</p><button class="btn-submit" style="width:auto; padding:10px 20px; margin-top:15px;" onclick="openPostModal()">نشر منشور</button></div>';
return;
}
container.innerHTML = displayPosts.map(post => {
const user = allUsers[post.userId] || {};
const isLiked = Array.isArray(post.likes) && post.likes.includes(currentUser.uid);
const isSaved = Array.isArray(post.saves) && post.saves.includes(currentUser.uid);
const isOwner = post.userId === currentUser.uid;

// === عرض الصورة إذا موجودة ===
let imageHtml = '';
if (post.imageBase64) {
imageHtml = `<div class="post-image-container">
<img src="${post.imageBase64}" class="post-image" alt="صورة المنشور" onclick="openImageModal('${post.imageBase64}')">
</div>`;
}

let repostHtml = '';
if (post.isRepost && post.originalUserName) {
repostHtml = `<div class="repost-badge"><i class="fas fa-retweet"></i> إعادة نشر من <strong>${escapeHtml(post.originalUserName)}</strong></div>`;
}

return `<div class="post-card" id="post-${post.id}">
${repostHtml}
<div class="post-header">
<div class="post-user" onclick="openProfile('${post.userId}')">
<img src="${user.profileImage || 'https://i.pravatar.cc/150?u=' + post.userId}" alt="${user.fullName}" class="post-avatar">
<div class="post-user-info">
<h4>${escapeHtml(user.fullName || post.userName || 'مستخدم')}</h4>
<span>${formatTime(post.timestamp)}</span>
</div>
</div>
${isOwner ? `<div class="post-options" onclick="togglePostOptions('${post.id}', event)"><i class="fas fa-ellipsis-h"></i></div>` : ''}
</div>
<div class="post-content">${escapeHtml(post.content)}</div>
${imageHtml}
<div class="post-stats">
<span><i class="fas fa-heart" style="color: var(--like-color)"></i> ${post.likesCount || 0}</span>
<span><i class="fas fa-comment"></i> ${post.commentsCount || 0}</span>
</div>
<div class="post-actions">
<button class="action-btn ${isLiked ? 'liked' : ''}" onclick="toggleLike('${post.id}')"><i class="${isLiked ? 'fas' : 'far'} fa-heart"></i><span>إعجاب</span></button>
<button class="action-btn" onclick="openCommentsModal('${post.id}')"><i class="far fa-comment"></i><span>تعليق</span></button>
<button class="action-btn" onclick="openShareModal('${post.id}')"><i class="far fa-share-square"></i><span>مشاركة</span></button>
<button class="action-btn ${isSaved ? 'saved' : ''}" onclick="toggleSave('${post.id}')"><i class="${isSaved ? 'fas' : 'far'} fa-bookmark"></i><span>حفظ</span></button>
</div>
</div>`;
}).join('');
}

// === تحديث زر تحميل المزيد ===
function updateLoadMoreButton() {
const container = document.getElementById('load-more-container');
const btn = document.getElementById('load-more-btn');
const searchQuery = document.getElementById('feed-search')?.value.toLowerCase() || '';
let postsToShow = [...allPosts];
if (currentFilter === 'following') postsToShow = postsToShow.filter(post => myFollowing.has(post.userId));
if (searchQuery) {
postsToShow = postsToShow.filter(post => {
const user = allUsers[post.userId];
const userName = (user?.fullName || user?.username || '').toLowerCase();
return userName.includes(searchQuery);
});
}
if (postsLimit < postsToShow.length) {
container.style.display = 'block';
btn.disabled = isLoadingMore;
btn.innerHTML = isLoadingMore ? '<i class="fas fa-spinner fa-spin"></i> جاري التحميل...' : '<i class="fas fa-plus"></i> تحميل المزيد';
} else { container.style.display = 'none'; }
}

// === تحميل المزيد ===
window.loadMorePosts = function() {
if (isLoadingMore) return;
isLoadingMore = true;
updateLoadMoreButton();
setTimeout(() => {
postsLimit += 10;
renderPosts();
updateLoadMoreButton();
isLoadingMore = false;
}, 500);
}

// === فلترة المنشورات ===
window.filterPosts = function(filter, element) {
currentFilter = filter;
postsLimit = 10;
document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
element.classList.add('active');
renderPosts();
updateLoadMoreButton();
}

window.filterPostsBySearch = function() {
postsLimit = 10;
renderPosts();
updateLoadMoreButton();
}

window.toggleSearch = function() {
const searchBar = document.getElementById('search-bar');
searchBar.classList.toggle('show');
if (searchBar.classList.contains('show')) document.getElementById('feed-search').focus();
}

// === الإعجاب ===
window.toggleLike = async function(postId) {
try {
const postRef = doc(db, "posts", postId);
const post = allPosts.find(p => p.id === postId);
const isLiked = Array.isArray(post?.likes) && post.likes.includes(currentUser.uid);
if (isLiked) await updateDoc(postRef, { likesCount: increment(-1), likes: arrayRemove(currentUser.uid) });
else await updateDoc(postRef, { likesCount: increment(1), likes: arrayUnion(currentUser.uid) });
} catch (error) { console.error('Error toggling like:', error); showAlert('error', 'خطأ', error.message); }
}

// === الحفظ ===
window.toggleSave = async function(postId) {
try {
const postRef = doc(db, "posts", postId);
const post = allPosts.find(p => p.id === postId);
const isSaved = Array.isArray(post?.saves) && post.saves.includes(currentUser.uid);
if (isSaved) {
await updateDoc(postRef, { saves: arrayRemove(currentUser.uid) });
showAlert('info', 'تم الحذف', 'تمت الإزالة من المحفوظات');
} else {
await updateDoc(postRef, { saves: arrayUnion(currentUser.uid) });
showAlert('success', 'تم الحفظ', 'تم الحفظ بنجاح');
}
} catch (error) { console.error('Error toggling save:', error); }
}

// === حذف المنشور ===
window.deletePost = async function(postId) {
if (!confirm('هل تريد حذف هذا المنشور نهائياً؟')) return;
try {
await deleteDoc(doc(db, "posts", postId));
showAlert('success', 'تم الحذف', 'تم حذف المنشور');
allPosts = allPosts.filter(p => p.id !== postId);
renderPosts();
updateLoadMoreButton();
} catch (error) { console.error('Error deleting post:', error); showAlert('error', 'خطأ', error.message); }
}

// === خيارات المنشور ===
window.togglePostOptions = function(postId, event) {
event.stopPropagation();
const post = allPosts.find(p => p.id === postId);
if (!post) return;
const isOwner = post.userId === currentUser.uid;
const menu = document.createElement('div');
menu.style.cssText = 'position:fixed;top:' + event.clientY + 'px;left:' + event.clientX + 'px;background:var(--card-bg);border-radius:12px;box-shadow:var(--shadow);z-index:3000;min-width:150px;overflow:hidden;border:1px solid var(--border-color);';
menu.innerHTML = [
{ text: '📋 نسخ الرابط', action: () => copyPostLink(postId) },
{ text: '🔄 إعادة نشر', action: () => repostToProfile(postId) },
...(isOwner ? [{ text: '🗑️ حذف', action: () => deletePost(postId), danger: true }] : [])
].map(opt => `<div style="padding:12px 15px;cursor:pointer;color:${opt.danger ? 'var(--danger-color)' : 'var(--text-main)'};border-bottom:1px solid var(--border-color);" onclick="${opt.action.toString()};this.parentElement.remove();">${opt.text}</div>`).join('');
document.body.appendChild(menu);
setTimeout(() => {
document.addEventListener('click', function closeMenu(e) {
if (!menu.contains(e.target)) { menu.remove(); document.removeEventListener('click', closeMenu); }
});
}, 100);
}

window.copyPostLink = function(postId) {
const url = window.location.origin + window.location.pathname + '?post=' + postId;
navigator.clipboard?.writeText(url).then(() => showAlert('success', 'تم النسخ', 'تم نسخ الرابط'))
.catch(() => {
const input = document.createElement('input');
input.value = url; document.body.appendChild(input); input.select();
document.execCommand('copy'); input.remove();
showAlert('success', 'تم النسخ', 'تم نسخ الرابط');
});
}

// === عرض البروفايل ===
window.openProfile = async function(userId) {
try {
const userDoc = await getDoc(doc(db, 'users', userId));
if (!userDoc.exists()) { showAlert('error', 'خطأ', 'المستخدم غير موجود'); return; }
const user = userDoc.data();
document.getElementById('modal-img').src = user.profileImage || 'https://i.pravatar.cc/150?u=' + userId;
document.getElementById('modal-name').textContent = user.fullName || 'مستخدم';
document.getElementById('modal-username').textContent = user.username ? '@' + user.username : '';
document.getElementById('modal-bio').textContent = user.bio || '';
const postsSnap = await getDocs(query(collection(db, 'posts'), where('userId', '==', userId)));
document.getElementById('modal-posts').textContent = postsSnap.size;
document.getElementById('modal-followers').textContent = Array.isArray(user.followers) ? user.followers.length : 0;
document.getElementById('modal-following').textContent = Array.isArray(user.following) ? user.following.length : 0;
const actionBtn = document.getElementById('modal-action-btn');
const isFollowing = myFollowing.has(userId);
const isSelf = userId === currentUser.uid;
if (isSelf) {
actionBtn.textContent = 'تعديل الملف'; actionBtn.className = 'btn-submit';
actionBtn.style.background = 'var(--input-bg)';
actionBtn.onclick = () => { closeProfile(); window.location.href = 'profile.html'; };
} else if (isFollowing) {
actionBtn.textContent = 'تتابع ✓'; actionBtn.className = 'btn-submit';
actionBtn.style.background = 'var(--input-bg)';
actionBtn.onclick = () => unfollowUser(userId);
} else {
actionBtn.textContent = 'متابعة'; actionBtn.className = 'btn-submit';
actionBtn.style.background = 'var(--primary-gradient)';
actionBtn.onclick = () => followUser(userId);
}
const postsList = document.getElementById('modal-posts-list');
postsList.innerHTML = '';
if (postsSnap.empty) {
postsList.innerHTML = '<div style="text-align:center; padding:20px; color:var(--text-secondary);">لا توجد منشورات</div>';
} else {
postsSnap.forEach(docSnap => {
const post = docSnap.data();
postsList.innerHTML += '<div class="post-card" style="margin:10px 0; padding:15px;"><div class="post-content" style="font-size:0.9rem;">' + escapeHtml(post.content) + '</div><div class="post-stats" style="margin:10px 0 0; padding:10px 0 0; font-size:0.8rem;"><span><i class="fas fa-heart" style="color: var(--like-color)"></i> ' + (post.likesCount || 0) + '</span><span><i class="fas fa-comment"></i> ' + (post.commentsCount || 0) + '</span></div></div>';
});
}
document.getElementById('profileModal').classList.add('show');
document.body.classList.add('scroll-locked');
} catch (error) { console.error('Error loading profile:', error); showAlert('error', 'خطأ', error.message); }
}

window.closeProfile = function() {
document.getElementById('profileModal').classList.remove('show');
document.body.classList.remove('scroll-locked');
}

// === متابعة/إلغاء متابعة ===
window.followUser = async function(userId) {
try {
await updateDoc(doc(db, "users", currentUser.uid), { following: arrayUnion(userId) });
await updateDoc(doc(db, "users", userId), { followers: arrayUnion(currentUser.uid) });
myFollowing.add(userId);
document.getElementById('modal-action-btn').textContent = 'تتابع ✓';
showAlert('success', 'تمت المتابعة', 'أصبحت تتابع هذا المستخدم');
} catch (error) { showAlert('error', 'خطأ', error.message); }
}

window.unfollowUser = async function(userId) {
if (!confirm('هل تريد إلغاء المتابعة؟')) return;
try {
await updateDoc(doc(db, "users", currentUser.uid), { following: arrayRemove(userId) });
await updateDoc(doc(db, "users", userId), { followers: arrayRemove(currentUser.uid) });
myFollowing.delete(userId);
document.getElementById('modal-action-btn').textContent = 'متابعة';
showAlert('info', 'تم الإلغاء', 'تم إلغاء المتابعة');
} catch (error) { showAlert('error', 'خطأ', error.message); }
}

window.handleProfileAction = function() {
const btn = document.getElementById('modal-action-btn');
if (btn.textContent.includes('تتابع')) unfollowUser(currentProfileUserId);
else if (btn.textContent === 'متابعة') followUser(currentProfileUserId);
}

// === التعليقات ===
function renderComments(comments, postId, parentId, depth) {
if (depth > 3) return '';
const filtered = comments.filter(c => (!parentId && !c.parentCommentId) || c.parentCommentId === parentId);
if (filtered.length === 0) return '';
return filtered.sort((a, b) => {
const timeA = a.timestamp?.toDate?.() || a.timestamp || 0;
const timeB = b.timestamp?.toDate?.() || b.timestamp || 0;
return new Date(timeB) - new Date(timeA);
}).map(c => {
const isLiked = Array.isArray(c.likes) && c.likes.includes(currentUser.uid);
const isOwn = c.userId === currentUser.uid;
const isPostOwner = currentPostForComments && currentPostForComments.userId === currentUser.uid;
const canDelete = isOwn || isPostOwner;
const replies = comments.filter(r => r.parentCommentId === c.id);
let html = '<div class="comment-item ' + (parentId ? 'nested-comment' : '') + '" style="margin-right: ' + (depth * 20) + 'px;">';
html += '<img src="' + (c.userAvatar || 'https://i.pravatar.cc/150?u=' + (c.userId || '')) + '" class="comment-avatar" onclick="openProfile(\'' + c.userId + '\')">';
html += '<div class="comment-content">';
html += '<div class="comment-header">';
html += '<span class="comment-author" onclick="openProfile(\'' + c.userId + '\')">' + escapeHtml(c.userName || 'مستخدم') + '</span>';
html += '<span class="comment-time">' + formatTime(c.timestamp) + '</span>';
html += '</div>';
html += '<div class="comment-text">' + escapeHtml(c.text || '') + '</div>';
html += '<div class="comment-actions">';
html += '<button class="comment-action ' + (isLiked ? 'liked' : '') + '" onclick="toggleCommentLike(\'' + c.id + '\', \'' + postId + '\')"><i class="' + (isLiked ? 'fas' : 'far') + ' fa-heart"></i> ' + (c.likesCount || 0) + '</button>';
html += '<button class="comment-action" onclick="showReplyInput(\'' + c.id + '\')"><i class="fas fa-reply"></i> رد</button>';
if (canDelete) html += '<button class="comment-action delete" onclick="deleteComment(\'' + c.id + '\', \'' + postId + '\')"><i class="fas fa-trash"></i></button>';
html += '</div>';
if (replies.length) html += '<div class="nested-comments">' + renderComments(comments, postId, c.id, depth + 1) + '</div>';
html += '<div class="reply-input-wrapper" id="reply-' + c.id + '" style="display: none;">';
html += '<input type="text" class="reply-input" placeholder="اكتب ردك..." onkeypress="handleReplyKey(event, \'' + c.id + '\', \'' + postId + '\')" data-parent="' + c.id + '">';
html += '<div class="reply-actions">';
html += '<button class="reply-send" onclick="addReply(\'' + c.id + '\', \'' + postId + '\')"><i class="fas fa-paper-plane"></i></button>';
html += '<button class="reply-cancel" onclick="cancelReply(\'' + c.id + '\')"><i class="fas fa-times"></i></button>';
html += '</div></div></div></div>';
return html;
}).join('');
}

async function loadComments(postId) {
const commentsRef = collection(db, "posts", postId, "comments");
const unsubscribe = onSnapshot(commentsRef, (snapshot) => {
const comments = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
if (currentCommentsPostId === postId) {
currentPostForComments = { ...allPosts.find(p => p.id === postId), comments: comments };
document.getElementById('commentsCount').textContent = comments.length;
renderFullComments();
}
});
commentsListeners.set(postId, unsubscribe);
return unsubscribe;
}

currentCommentsPostId = postId;
currentPostForComments = allPosts.find(p => p.id === postId);
if (!currentPostForComments) return;
const user = allUsers[currentPostForComments.userId] || {};
document.getElementById('commentsTitle').textContent = (user.fullName || 'مستخدم') + ' - التعليقات';
document.getElementById('main-comment-input').dataset.postId = postId;
document.getElementById('commentsModal').classList.add('show');
document.body.classList.add('scroll-locked');
document.getElementById('main-comment-input').addEventListener('focus', () => document.body.classList.add('keyboard-open'));
document.getElementById('main-comment-input').addEventListener('blur', () => setTimeout(() => document.body.classList.remove('keyboard-open'), 300));
await loadComments(postId);
}

window.closeCommentsModal = function() {
document.getElementById('commentsModal').classList.remove('show');
document.body.classList.remove('scroll-locked');
document.body.classList.remove('keyboard-open');
currentCommentsPostId = null;
currentPostForComments = null;
if (currentCommentsPostId && commentsListeners.has(currentCommentsPostId)) {
commentsListeners.get(currentCommentsPostId)();

function renderFullComments() {
const container = document.getElementById('fullCommentsList');
const comments = Array.isArray(currentPostForComments?.comments) ? currentPostForComments.comments : [];
if (comments.length === 0) { container.innerHTML = '<div class="empty-state"><p>لا توجد تعليقات بعد</p></div>'; return; }
container.innerHTML = renderComments(comments, currentCommentsPostId, null, 0);
}

window.addMainComment = async function() { await addComment('', currentCommentsPostId); }
window.handleMainCommentKey = function(e) { if (e.key === 'Enter') { e.preventDefault(); addMainComment(); } }

window.addComment = async function(parentCommentId, postId) {
const inputId = parentCommentId ? '#reply-' + parentCommentId + ' input' : '#main-comment-input';
const input = document.querySelector(inputId);
const text = input?.value.trim();
if (!text || !postId) return;
try {
const commentsRef = collection(db, "posts", postId, "comments");
await addDoc(commentsRef, {
id: "c_" + Date.now(), parentCommentId: parentCommentId || null,
userId: currentUser.uid, userName: currentUser.fullName,
userAvatar: currentUser.profileImage || '', text: text,
likes: [], likesCount: 0, timestamp: serverTimestamp()
});
await updateDoc(doc(db, "posts", postId), { commentsCount: increment(1) });
if (input) input.value = '';
const replyWrapper = input?.closest('.reply-input-wrapper');
if (replyWrapper) replyWrapper.style.display = 'none';
if (currentCommentsPostId === postId) loadComments(postId);
showAlert('success', 'تم الإرسال', 'تم نشر التعليق');
} catch (error) { showAlert('error', 'خطأ', error.message); }
}

window.showReplyInput = function(commentId) {
const wrapper = document.getElementById('reply-' + commentId);
if (wrapper) {
wrapper.style.display = wrapper.style.display === 'none' ? 'flex' : 'none';
const input = wrapper.querySelector('input');
if (input) { input.focus(); document.body.classList.add('keyboard-open'); }
}
}
window.cancelReply = function(commentId) {
const wrapper = document.getElementById('reply-' + commentId);
if (wrapper) { wrapper.style.display = 'none'; const input = wrapper.querySelector('input'); if (input) input.value = ''; document.body.classList.remove('keyboard-open'); }
}
window.handleReplyKey = function(event, commentId, postId) {
if (event.key === 'Enter' && !event.shiftKey) { event.preventDefault(); addComment(commentId, postId); }
}
window.addReply = async function(parentCommentId, postId) { await addComment(parentCommentId, postId); }

window.deleteComment = async function(commentId, postId) {
if (!confirm('هل تريد حذف هذا التعليق؟')) return;
try {
const commentRef = doc(db, "posts", postId, "comments", commentId);
await deleteDoc(commentRef);
await updateDoc(doc(db, "posts", postId), { commentsCount: increment(-1) });
showAlert('success', 'تم الحذف', 'تم حذف التعليق');
if (currentCommentsPostId === postId && currentPostForComments) {
currentPostForComments.comments = currentPostForComments.comments.filter(c => c.id !== commentId && c.parentCommentId !== commentId);
renderFullComments();
}
} catch (error) { console.error('Delete comment error:', error); showAlert('error', 'خطأ', 'حدث خطأ أثناء الحذف: ' + error.message); }
}

window.toggleCommentLike = async function(commentId, postId) {
try {
const commentsRef = collection(db, "posts", postId, "comments");
const commentQuery = query(commentsRef, where("id", "==", commentId));
const commentSnap = await getDocs(commentQuery);
if (commentSnap.empty) return;
const commentDoc = commentSnap.docs[0];
const comment = commentDoc.data();
const isLiked = Array.isArray(comment.likes) && comment.likes.includes(currentUser.uid);
if (isLiked) await updateDoc(doc(db, "posts", postId, "comments", commentId), { likes: arrayRemove(currentUser.uid), likesCount: increment(-1) });
else await updateDoc(doc(db, "posts", postId, "comments", commentId), { likes: arrayUnion(currentUser.uid), likesCount: increment(1) });
if (currentPostForComments && currentCommentsPostId === postId) loadComments(postId);
} catch (error) { console.error('Toggle comment like error:', error); }
}

// ✅ === معالجة رفع الصورة وتحويلها لـ Base64 ===
const imageUploadInput = document.getElementById('image-upload-input');
const imagePreview = document.getElementById('image-preview');
const imagePreviewContainer = document.getElementById('image-preview-container');
const imageUploadLoading = document.getElementById('image-upload-loading');
const imageUploadText = document.getElementById('image-upload-text');

imageUploadInput.addEventListener('change', async function(e) {
const file = e.target.files[0];
if (!file) return;

// التحقق من نوع الملف
if (!file.type.startsWith('image/')) {
showAlert('warning', 'تنبيه', 'يرجى اختيار ملف صورة صالح');
return;
}

// التحقق من حجم الملف (أقصى حجم 2 ميجابايت لتجنب مشاكل قاعدة البيانات)
if (file.size > 2 * 1024 * 1024) {
showAlert('warning', 'حجم كبير', 'يرجى اختيار صورة أقل من 2 ميجابايت');
return;
}

// عرض مؤشر التحميل
imageUploadLoading.classList.add('show');
imageUploadText.textContent = 'جاري المعالجة...';

try {
// تحويل الصورة لـ Base64
selectedImageBase64 = await fileToBase64(file);

// عرض المعاينة
imagePreview.src = selectedImageBase64;
imagePreviewContainer.style.display = 'block';
imageUploadText.textContent = 'تغيير الصورة';
showAlert('success', 'تمت الإضافة', 'تم إضافة الصورة للمنشور');
} catch (error) {
console.error('Error processing image:', error);
showAlert('error', 'خطأ', 'فشل في معالجة الصورة');
} finally {
imageUploadLoading.classList.remove('show');
}
});

// دالة تحويل ملف لـ Base64
function fileToBase64(file) {
return new Promise((resolve, reject) => {
const reader = new FileReader();
reader.readAsDataURL(file);
reader.onload = () => resolve(reader.result);
reader.onerror = error => reject(error);
});
}

// إزالة الصورة المحددة
window.removeSelectedImage = function() {

// === دوال مساعدة ===
function escapeHtml(text) {
if (!text) return '';
const div = document.createElement('div');
div.textContent = text;
return div.innerHTML;
}

function formatTime(timestamp) {
if (!timestamp) return '';
const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
const now = new Date();
const diff = now - date;
if (diff < 60000) return 'الآن';
if (diff < 3600000) return Math.floor(diff / 60000) + ' دقيقة';
if (diff < 86400000) return Math.floor(diff / 3600000) + ' ساعة';
return date.toLocaleDateString('ar-SA');
}

function showAlert(type, title, message) {
const alert = document.createElement('div');
alert.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--card-bg);border-radius:16px;padding:15px 25px;box-shadow:0 10px 40px rgba(0,0,0,0.2);z-index:4000;display:flex;align-items:center;gap:10px;animation:slideDown 0.3s;border-right:4px solid ' + (type==='success'?'var(--success-color)':type==='error'?'var(--danger-color)':'var(--warning-color)');
alert.innerHTML = '<i class="fas fa-' + (type==='success'?'check-circle':type==='error'?'exclamation-circle':'info-circle') + '" style="color:' + (type==='success'?'var(--success-color)':type==='error'?'var(--danger-color)':'var(--warning-color)') + '"></i><div><b>' + title + '</b><br><small style="color:var(--text-secondary)">' + message + '</small></div>';
document.body.appendChild(alert);
setTimeout(() => alert.remove(), 3000);
}

// 🔙 نظام زر الرجوع المزدوج (مثل أندرويد)
// ========================================

let exitConfirmTimeout = null;
let exitConfirmShown = false;

async function handleBackButton() {
    // إذا كان أي مودال مفتوح، أغلقه أولاً
    const openModals = document.querySelectorAll('.modal-overlay.show, .profile-modal-overlay.show');
    if (openModals.length > 0) {
        openModals.forEach(modal => {
            modal.classList.remove('show');
            document.body.classList.remove('scroll-locked', 'keyboard-open');
        });
        return true; // تم التعامل مع الحدث
    }
    
    // إذا كانت لوحة الإشعارات مفتوحة، أغلقها
    const notificationPanel = document.getElementById('notification-panel');
    if (notificationPanel?.classList.contains('show')) {
        closeNotificationPanel?.();
        return true;
    }
    
    // إذا كنا في الصفحة الرئيسية للتطبيق
    if (window.location.pathname.includes('home.html') || window.location.pathname.endsWith('/')) {
        if (!exitConfirmShown) {
            // أول ضغطة: اعرض رسالة التأكيد
            exitConfirmShown = true;
            showToast('اضغط مرة أخرى للخروج', 'warning');
            
            // أعد العداد بعد 2 ثانية
            exitConfirmTimeout = setTimeout(() => {
                exitConfirmShown = false;
            }, 2000);
            return false; // لا تخرج بعد
        } else {
            // ثاني ضغطة: اخرج من التطبيق
            clearTimeout(exitConfirmTimeout);
            await exitApp();
            return true;
        }
    }
    
    // في الصفحات الأخرى: ارجع للصفحة السابقة
    if (window.history.length > 1) {
        window.history.back();
        return true;
    }
    
    return false;
}

// دالة الخروج من التطبيق (Capacitor)
async function exitApp() {
    if (typeof Capacitor !== 'undefined' && Capacitor.Plugins?.App) {
        await Capacitor.Plugins.App.exitApp();
    } else {
        // للمتصفح: حاول إغلاق النافذة
        window.close();
        // أو ارجع للرئيسية
        window.location.href = 'index.html';
    }
}

// دالة عرض رسالة سريعة (Toast)
function showToast(message, type = 'info') {
    // إزالة أي Toast موجود
    const existing = document.getElementById('back-toast');
    if (existing) existing.remove();
    
    const toast = document.createElement('div');
    toast.id = 'back-toast';
    toast.style.cssText = `
        position: fixed;
        bottom: 100px;
        left: 50%;
        transform: translateX(-50%);
        background: ${type === 'warning' ? 'var(--warning-color)' : 'var(--text-main)'};
        color: ${type === 'warning' ? '#000' : '#fff'};
        padding: 12px 24px;
        border-radius: 25px;
        font-size: 0.9rem;
        font-weight: 600;
        z-index: 9999;
        box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        animation: slideUpToast 0.3s ease;
        max-width: 80%;
        text-align: center;
    `;
    toast.textContent = message;
    document.body.appendChild(toast);
    
    // إضافة أنيميشن
    const style = document.createElement('style');
    style.textContent = `
        @keyframes slideUpToast {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
    `;
    document.head.appendChild(style);
    
    // إزالة الـ Toast بعد 2 ثانية
    setTimeout(() => {
        toast.style.animation = 'slideUpToast 0.3s ease reverse';
        setTimeout(() => toast.remove(), 300);
    }, 2000);
}

// الاستماع لزر الرجوع (أندرويد + متصفح)
document.addEventListener('DOMContentLoaded', () => {
    // لأندرويد عبر Capacitor
    if (typeof Capacitor !== 'undefined' && Capacitor.Plugins?.App) {
        Capacitor.Plugins.App.addListener('backButton', async ({ canGoBack }) => {
            const handled = await handleBackButton();
            if (!handled && !canGoBack) {
                await exitApp();
            }
        });
    }
    
    // للمتصفح (للتجربة على الكمبيوتر)
    window.addEventListener('popstate', (e) => {
        if (window.location.pathname.includes('home.html') || window.location.pathname.endsWith('/')) {
            e.preventDefault();
            handleBackButton();
        }
    });
});

// تنظيف عند إغلاق الصفحة
window.addEventListener('beforeunload', () => {
    clearTimeout(exitConfirmTimeout);
    if (typeof Capacitor !== 'undefined' && Capacitor.Plugins?.App) {
        Capacitor.Plugins.App.removeAllListeners();
    }
});
