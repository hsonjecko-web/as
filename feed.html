<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>المنشورات</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary-color: #6366f1; --primary-gradient: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%); --bg-color: #f8fafc; --card-bg: #ffffff; --text-main: #1e293b; --text-secondary: #64748b; --border-color: #e2e8f0; --input-bg: #f1f5f9; --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); --nav-height: 70px; --like-color: #ef4444; --save-color: #f59e0b; }
        body.dark-mode { --bg-color: #0f172a; --card-bg: #1e293b; --text-main: #f1f5f9; --text-secondary: #94a3b8; --border-color: #334155; --input-bg: #334155; --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-color); color: var(--text-main); padding-bottom: calc(var(--nav-height) + 20px); transition: background-color 0.3s ease; }
        header { position: sticky; top: 0; z-index: 100; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: var(--shadow); border-bottom: 1px solid var(--border-color); }
        body.dark-mode header { background: rgba(30, 41, 59, 0.9); }
        .header-title { font-size: 1.4rem; font-weight: 800; background: var(--primary-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header-actions button { background: var(--input-bg); border: none; width: 40px; height: 40px; border-radius: 12px; color: var(--text-main); cursor: pointer; transition: all 0.3s; }
        .header-actions button:hover { background: var(--primary-color); color: white; }
        .filters-scroll { display: flex; overflow-x: auto; padding: 15px 20px; gap: 12px; scrollbar-width: none; }
        .filters-scroll::-webkit-scrollbar { display: none; }
        .filter-chip { padding: 8px 20px; background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 20px; font-size: 0.9rem; font-weight: 600; color: var(--text-secondary); white-space: nowrap; cursor: pointer; transition: all 0.3s; }
        .filter-chip.active { background: var(--primary-gradient); color: white; border-color: transparent; box-shadow: 0 4px 10px rgba(99, 102, 241, 0.4); }
        .post-card { background-color: var(--card-bg); margin: 15px 20px; border-radius: 20px; padding: 20px; box-shadow: var(--shadow); border: 1px solid var(--border-color); transition: transform 0.2s; }
        .post-card:hover { transform: translateY(-2px); }
        .post-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .post-user { display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .post-avatar { width: 45px; height: 45px; border-radius: 14px; object-fit: cover; border: 2px solid var(--primary-color); }
        .post-user-info h4 { font-size: 1rem; font-weight: 700; color: var(--text-main); margin-bottom: 2px; }
        .post-user-info span { font-size: 0.75rem; color: var(--text-secondary); }
        .post-options { color: var(--text-secondary); cursor: pointer; padding: 5px; }
        .post-content { font-size: 1.05rem; line-height: 1.7; color: var(--text-main); margin-bottom: 20px; white-space: pre-wrap; }
        .post-stats { display: flex; justify-content: space-between; color: var(--text-secondary); font-size: 0.85rem; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid var(--border-color); }
        .post-actions { display: flex; justify-content: space-between; padding-top: 5px; }
        .action-btn { background: none; border: none; color: var(--text-secondary); font-size: 1.3rem; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 5px; transition: all 0.3s; position: relative; }
        .action-btn span { font-size: 0.75rem; font-weight: 500; }
        .action-btn:hover { color: var(--primary-color); transform: translateY(-2px); }
        .action-btn.liked { color: var(--like-color); }
        .action-btn.liked i { animation: pop 0.3s ease; }
        .action-btn.saved { color: var(--save-color); }
        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }
        .profile-modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); z-index: 2000; display: none; justify-content: center; align-items: flex-end; }
        .profile-modal-overlay.show { display: flex; }
        .profile-modal { background: var(--card-bg); width: 100%; max-width: 500px; height: 90vh; border-radius: 30px 30px 0 0; padding: 20px; overflow-y: auto; animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1); position: relative; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .close-modal { position: absolute; top: 20px; left: 20px; width: 35px; height: 35px; border-radius: 50%; background: var(--input-bg); border: none; color: var(--text-main); cursor: pointer; z-index: 10; }
        .profile-header { text-align: center; margin-bottom: 30px; padding-top: 20px; }
        .profile-avatar-large { width: 100px; height: 100px; border-radius: 25px; object-fit: cover; border: 4px solid var(--primary-color); margin-bottom: 15px; box-shadow: 0 8px 20px rgba(99, 102, 241, 0.3); }
        .profile-name { font-size: 1.5rem; font-weight: 800; margin-bottom: 5px; }
        .profile-bio { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 20px; }
        .profile-stats-row { display: flex; justify-content: center; gap: 30px; margin-bottom: 20px; }
        .stat-item { text-align: center; }
        .stat-item b { display: block; font-size: 1.2rem; color: var(--text-main); }
        .stat-item span { font-size: 0.8rem; color: var(--text-secondary); }
        .profile-posts-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 15px; border-right: 4px solid var(--primary-color); padding-right: 10px; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: var(--nav-height); background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--border-color); box-shadow: 0 -4px 20px rgba(0,0,0,0.08); z-index: 1000; }
        body.dark-mode .bottom-nav { background: rgba(30, 41, 59, 0.95); }
        .nav-item { display: flex; flex-direction: column; align-items: center; text-decoration: none; color: var(--text-secondary); font-size: 0.7rem; gap: 6px; transition: all 0.3s; }
        .nav-item i { font-size: 1.3rem; }
        .nav-item.active { color: var(--primary-color); }
        .nav-item.active i { transform: translateY(-3px); }
        .fab-write { position: fixed; bottom: 90px; left: 20px; width: 60px; height: 60px; border-radius: 50%; background: var(--primary-gradient); color: white; border: none; box-shadow: 0 8px 20px rgba(99, 102, 241, 0.4); display: flex; align-items: center; justify-content: center; font-size: 1.5rem; cursor: pointer; z-index: 900; transition: transform 0.3s; }
        .fab-write:hover { transform: scale(1.1) rotate(90deg); }
        .loading { text-align: center; padding: 40px; color: var(--text-secondary); }
    </style>
</head>
<body>
    <header>
        <div class="header-title">المنشورات</div>
        <div class="header-actions">
            <button><i class="fas fa-search"></i></button>
        </div>
    </header>
    <div class="filters-scroll">
        <div class="filter-chip active" onclick="filterPosts('all', this)">الكل</div>
        <div class="filter-chip" onclick="filterPosts('following', this)">متابعون</div>
        <div class="filter-chip" onclick="filterPosts('popular', this)">الأكثر تفاعلاً</div>
        <div class="filter-chip" onclick="filterPosts('new', this)">جديد</div>
    </div>
    <main id="posts-container">
        <div class="loading"><i class="fas fa-spinner fa-spin"></i> جاري تحميل المنشورات...</div>
    </main>
    <button class="fab-write"><i class="fas fa-pen"></i></button>
    <nav class="bottom-nav">
        <a href="home.html" class="nav-item active"><i class="fas fa-home"></i><span>الرئيسية</span></a>
        <a href="feed.html" class="nav-item"><i class="fas fa-newspaper"></i><span>المنشورات</span></a>
        <a href="chat.html" class="nav-item"><i class="fas fa-comment-dots"></i><span>الدردشة</span></a>
        <a href="friends.html" class="nav-item"><i class="fas fa-user-friends"></i><span>الأصدقاء</span></a>
        <a href="profile.html" class="nav-item"><i class="fas fa-user"></i><span>حسابي</span></a>
    </nav>
    <div class="profile-modal-overlay" id="profileModal">
        <div class="profile-modal">
            <button class="close-modal" onclick="closeProfile()"><i class="fas fa-times"></i></button>
            <div class="profile-header">
                <img src="" alt="Profile" class="profile-avatar-large" id="modal-img">
                <h2 class="profile-name" id="modal-name">اسم المستخدم</h2>
                <p class="profile-bio" id="modal-bio">نبذة المستخدم</p>
                <div class="profile-stats-row">
                    <div class="stat-item"><b id="modal-posts">0</b><span>منشور</span></div>
                    <div class="stat-item"><b id="modal-followers">0</b><span>متابع</span></div>
                    <div class="stat-item"><b id="modal-following">0</b><span>يتابع</span></div>
                </div>
                <button style="width: 100%; padding: 12px; background: var(--primary-gradient); color: white; border: none; border-radius: 12px; font-weight: 700; cursor: pointer;">متابعة</button>
            </div>
            <h3 class="profile-posts-title">منشورات المستخدم</h3>
            <div id="modal-posts-list"></div>
        </div>
    </div>

    <script type="module">
        
        import { db, collection, query, orderBy, limit, onSnapshot, doc, getDoc, updateDoc, arrayUnion, arrayRemove, serverTimestamp } from './firebase-config.js';

        const currentUser = JSON.parse(localStorage.getItem('currentUser'));
        if (!currentUser || !currentUser.isLoggedIn) { window.location.href = 'index.html'; }

        let allPosts = [];
        let currentFilter = 'all';

        // تحميل المنشورات في الوقت الفعلي
        const postsQuery = query(collection(db, "posts"), orderBy("timestamp", "desc"), limit(50));
        onSnapshot(postsQuery, (snapshot) => {
            allPosts = [];
            snapshot.forEach(doc => {
                allPosts.push({ id: doc.id, ...doc.data() });
            });
            renderPosts();
        });

        function renderPosts() {
            const container = document.getElementById('posts-container');
            let postsToShow = allPosts;
            
            if (currentFilter === 'following') {
                // هنا يجب جلب قائمة المتابعين من قاعدة البيانات
                // للتجربة: نعرض جميع المنشورات
            } else if (currentFilter === 'popular') {
                postsToShow = [...allPosts].sort((a, b) => (b.likesCount || 0) - (a.likesCount || 0));
            } else if (currentFilter === 'new') {
                postsToShow = [...allPosts].sort((a, b) => (b.timestamp?.toDate?.() || 0) - (a.timestamp?.toDate?.() || 0));
            }

            if (postsToShow.length === 0) {
                container.innerHTML = '<div class="loading">لا توجد منشورات حالياً</div>';
                return;
            }

            container.innerHTML = postsToShow.map(post => `
                <div class="post-card">
                    <div class="post-header">
                        <div class="post-user" onclick="openProfile('${post.userId}')">
                            <img src="${post.userAvatar || 'https://i.pravatar.cc/150'}" alt="${post.userName}" class="post-avatar">
                            <div class="post-user-info">
                                <h4>${post.userName}</h4>
                                <span>${formatTime(post.timestamp)}</span>
                            </div>
                        </div>
                        <div class="post-options"><i class="fas fa-ellipsis-h"></i></div>
                    </div>
                    <div class="post-content">${post.content}</div>
                    <div class="post-stats">
                        <span><i class="fas fa-heart" style="color: var(--like-color)"></i> ${post.likesCount || 0} إعجاب</span>
                        <span>${post.commentsCount || 0} تعليق</span>
                    </div>
                    <div class="post-actions">
                        <button class="action-btn ${post.likes?.includes(currentUser.uid) ? 'liked' : ''}" onclick="toggleLike('${post.id}')">
                            <i class="${post.likes?.includes(currentUser.uid) ? 'fas' : 'far'} fa-heart"></i>
                            <span>إعجاب</span>
                        </button>
                        <button class="action-btn"><i class="far fa-comment"></i><span>تعليق</span></button>
                        <button class="action-btn"><i class="far fa-share-square"></i><span>مشاركة</span></button>
                        <button class="action-btn ${post.saves?.includes(currentUser.uid) ? 'saved' : ''}" onclick="toggleSave('${post.id}')">
                            <i class="${post.saves?.includes(currentUser.uid) ? 'fas' : 'far'} fa-bookmark"></i>
                            <span>حفظ</span>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        window.filterPosts = function(filter, element) {
            currentFilter = filter;
            document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
            element.classList.add('active');
            renderPosts();
        }

        window.toggleLike = async function(postId) {
            const postRef = doc(db, "posts", postId);
            const post = allPosts.find(p => p.id === postId);
            const isLiked = post.likes?.includes(currentUser.uid);
            
            if (isLiked) {
                await updateDoc(postRef, {
                    likesCount: increment(-1),
                    likes: arrayRemove(currentUser.uid)
                });
            } else {
                await updateDoc(postRef, {
                    likesCount: increment(1),
                    likes: arrayUnion(currentUser.uid)
                });
            }
        }

        window.toggleSave = async function(postId) {
            const postRef = doc(db, "posts", postId);
            const post = allPosts.find(p => p.id === postId);
            const isSaved = post.saves?.includes(currentUser.uid);
            
            if (isSaved) {
                await updateDoc(postRef, { saves: arrayRemove(currentUser.uid) });
            } else {
                await updateDoc(postRef, { saves: arrayUnion(currentUser.uid) });
            }
        }

        window.openProfile = async function(userId) {
            const userRef = doc(db, "users", userId);
            const userSnap = await getDoc(userRef);
            if (userSnap.exists()) {
                const user = userSnap.data();
                document.getElementById('modal-name').textContent = user.fullName;
                document.getElementById('modal-img').src = user.profileImage || 'https://i.pravatar.cc/150';
                document.getElementById('modal-bio').textContent = user.bio || 'لا توجد نبذة';
                document.getElementById('modal-posts').textContent = user.stats?.postsCount || 0;
                document.getElementById('modal-followers').textContent = user.stats?.followersCount || 0;
                document.getElementById('modal-following').textContent = user.stats?.friendsCount || 0;
                
                // جلب منشورات المستخدم
                const userPostsQuery = query(collection(db, "posts"), where("userId", "==", userId), orderBy("timestamp", "desc"), limit(10));
                const postsSnap = await getDocs(userPostsQuery);
                const userPosts = [];
                postsSnap.forEach(doc => { userPosts.push({ id: doc.id, ...doc.data() }); });
                
                document.getElementById('modal-posts-list').innerHTML = userPosts.map(post => `
                    <div style="background: var(--input-bg); padding: 15px; border-radius: 12px; margin-bottom: 10px;">
                        ${post.content.substring(0, 100)}${post.content.length > 100 ? '...' : ''}
                    </div>
                `).join('') || '<div style="text-align:center; color:var(--text-secondary);">لا توجد منشورات</div>';
                
                document.getElementById('profileModal').classList.add('show');
            }
        }

        window.closeProfile = function() {
            document.getElementById('profileModal').classList.remove('show');
        }

        function formatTime(timestamp) {
            if (!timestamp) return '';
            const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
            const now = new Date();
            const diff = now - date;
            if (diff < 60000) return 'الآن';
            if (diff < 3600000) return Math.floor(diff / 60000) + ' دقيقة';
            if (diff < 86400000) return Math.floor(diff / 3600000) + ' ساعة';
            return date.toLocaleDateString('ar-SA');
        }
    </script>
</body>
</html>
