<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>المنشورات</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary-color: #6366f1; --primary-gradient: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%); --bg-color: #f8fafc; --card-bg: #ffffff; --text-main: #1e293b; --text-secondary: #64748b; --border-color: #e2e8f0; --input-bg: #f1f5f9; --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); --nav-height: 70px; --like-color: #ef4444; --save-color: #f59e0b; }
        body.dark-mode { --bg-color: #0f172a; --card-bg: #1e293b; --text-main: #f1f5f9; --text-secondary: #94a3b8; --border-color: #334155; --input-bg: #334155; --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-color); color: var(--text-main); padding-bottom: calc(var(--nav-height) + 20px); transition: background-color 0.3s ease; }
        header { position: sticky; top: 0; z-index: 100; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: var(--shadow); border-bottom: 1px solid var(--border-color); }
        body.dark-mode header { background: rgba(30, 41, 59, 0.9); }
        .header-title { font-size: 1.4rem; font-weight: 800; background: var(--primary-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header-actions button { background: var(--input-bg); border: none; width: 40px; height: 40px; border-radius: 12px; color: var(--text-main); cursor: pointer; transition: all 0.3s; margin-left: 10px; }
        .header-actions button:hover { background: var(--primary-color); color: white; }
        .filters-scroll { display: flex; overflow-x: auto; padding: 15px 20px; gap: 12px; scrollbar-width: none; }
        .filters-scroll::-webkit-scrollbar { display: none; }
        .filter-chip { padding: 8px 20px; background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 20px; font-size: 0.9rem; font-weight: 600; color: var(--text-secondary); white-space: nowrap; cursor: pointer; transition: all 0.3s; }
        .filter-chip.active { background: var(--primary-gradient); color: white; border-color: transparent; box-shadow: 0 4px 10px rgba(99, 102, 241, 0.4); }
        .post-card { background-color: var(--card-bg); margin: 15px 20px; border-radius: 20px; padding: 20px; box-shadow: var(--shadow); border: 1px solid var(--border-color); transition: transform 0.2s; }
        .post-card:hover { transform: translateY(-2px); }
        .post-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .post-user { display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .post-avatar { width: 45px; height: 45px; border-radius: 14px; object-fit: cover; border: 2px solid var(--primary-color); }
        .post-user-info h4 { font-size: 1rem; font-weight: 700; color: var(--text-main); margin-bottom: 2px; }
        .post-user-info span { font-size: 0.75rem; color: var(--text-secondary); }
        .post-options { color: var(--text-secondary); cursor: pointer; padding: 5px; }
        .post-content { font-size: 1.05rem; line-height: 1.7; color: var(--text-main); margin-bottom: 20px; white-space: pre-wrap; }
        .post-stats { display: flex; justify-content: space-between; color: var(--text-secondary); font-size: 0.85rem; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid var(--border-color); }
        .post-actions { display: flex; justify-content: space-between; padding-top: 5px; }
        .action-btn { background: none; border: none; color: var(--text-secondary); font-size: 1.3rem; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 5px; transition: all 0.3s; position: relative; }
        .action-btn span { font-size: 0.75rem; font-weight: 500; }
        .action-btn:hover { color: var(--primary-color); transform: translateY(-2px); }
        .action-btn.liked { color: var(--like-color); }
        .action-btn.liked i { animation: pop 0.3s ease; }
        .action-btn.saved { color: var(--save-color); }
        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }
        .profile-modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); z-index: 2000; display: none; justify-content: center; align-items: flex-end; }
        .profile-modal-overlay.show { display: flex; }
        .profile-modal { background: var(--card-bg); width: 100%; max-width: 500px; height: 90vh; border-radius: 30px 30px 0 0; padding: 20px; overflow-y: auto; animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1); position: relative; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .close-modal { position: absolute; top: 20px; left: 20px; width: 35px; height: 35px; border-radius: 50%; background: var(--input-bg); border: none; color: var(--text-main); cursor: pointer; z-index: 10; }
        .profile-header { text-align: center; margin-bottom: 30px; padding-top: 20px; }
        .profile-avatar-large { width: 100px; height: 100px; border-radius: 25px; object-fit: cover; border: 4px solid var(--primary-color); margin-bottom: 15px; box-shadow: 0 8px 20px rgba(99, 102, 241, 0.3); }
        .profile-name { font-size: 1.5rem; font-weight: 800; margin-bottom: 5px; }
        .profile-bio { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 20px; }
        .profile-stats-row { display: flex; justify-content: center; gap: 30px; margin-bottom: 20px; }
        .stat-item { text-align: center; }
        .stat-item b { display: block; font-size: 1.2rem; color: var(--text-main); }
        .stat-item span { font-size: 0.8rem; color: var(--text-secondary); }
        .profile-posts-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 15px; border-right: 4px solid var(--primary-color); padding-right: 10px; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: var(--nav-height); background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--border-color); box-shadow: 0 -4px 20px rgba(0,0,0,0.08); z-index: 1000; }
        body.dark-mode .bottom-nav { background: rgba(30, 41, 59, 0.95); }
        .nav-item { display: flex; flex-direction: column; align-items: center; text-decoration: none; color: var(--text-secondary); font-size: 0.7rem; gap: 6px; transition: all 0.3s; }
        .nav-item i { font-size: 1.3rem; }
        .nav-item.active { color: var(--primary-color); }
        .nav-item.active i { transform: translateY(-3px); }
        .fab-write { position: fixed; bottom: 90px; left: 20px; width: 60px; height: 60px; border-radius: 50%; background: var(--primary-gradient); color: white; border: none; box-shadow: 0 8px 20px rgba(99, 102, 241, 0.4); display: flex; align-items: center; justify-content: center; font-size: 1.5rem; cursor: pointer; z-index: 900; transition: transform 0.3s; }
        .fab-write:hover { transform: scale(1.1) rotate(90deg); }
        .loading { text-align: center; padding: 40px; color: var(--text-secondary); }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); z-index: 2000; display: none; justify-content: center; align-items: flex-end; }
        .modal-overlay.show { display: flex; }
        .modal-content { background: var(--card-bg); width: 100%; max-width: 500px; border-radius: 25px 25px 0 0; padding: 25px; animation: slideUp 0.3s; max-height: 85vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-title { font-size: 1.2rem; font-weight: 800; }
        .form-input { width: 100%; padding: 12px; background: var(--input-bg); border: 1px solid var(--border-color); border-radius: 12px; color: var(--text-main); outline: none; margin-bottom: 15px; }
        .form-input:focus { border-color: var(--primary-color); }
        .form-textarea { min-height: 120px; resize: vertical; }
        .btn-submit { width: 100%; padding: 14px; background: var(--primary-gradient); color: white; border: none; border-radius: 14px; font-weight: 700; cursor: pointer; }
        .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }
        .comments-section { margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--border-color); display: none; }
        .comments-section.show { display: block; }
        .comment-item { display: flex; gap: 10px; margin-bottom: 12px; }
        .comment-avatar { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
        .comment-content { flex: 1; background: var(--input-bg); padding: 10px 15px; border-radius: 15px; }
        .comment-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .comment-author { font-weight: 600; font-size: 0.85rem; }
        .comment-time { font-size: 0.7rem; color: var(--text-secondary); }
        .comment-text { font-size: 0.9rem; color: var(--text-main); }
        .comment-input-wrapper { display: flex; gap: 10px; margin-top: 15px; }
        .comment-input { flex: 1; padding: 12px; background: var(--input-bg); border: none; border-radius: 20px; color: var(--text-main); outline: none; }
        .comment-send { width: 40px; height: 40px; border-radius: 50%; background: var(--primary-gradient); color: white; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .share-options { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; padding: 20px 0; }
        .share-option { display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; }
        .share-option i { width: 50px; height: 50px; border-radius: 14px; background: var(--input-bg); display: flex; align-items: center; justify-content: center; font-size: 1.3rem; transition: 0.3s; }
        .share-option:hover i { background: var(--primary-gradient); color: white; transform: translateY(-3px); }
        .share-option span { font-size: 0.8rem; color: var(--text-secondary); }
        .copy-link { margin-top: 15px; padding: 10px; background: var(--input-bg); border-radius: 10px; display: flex; align-items: center; gap: 10px; }
        .copy-link input { flex: 1; background: none; border: none; color: var(--text-main); outline: none; }
        .copy-link button { background: var(--primary-color); color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <header>
        <div class="header-title">المنشورات</div>
        <div class="header-actions">
            <button onclick="refreshPosts()" title="تحديث"><i class="fas fa-sync-alt"></i></button>
            <button><i class="fas fa-search"></i></button>
        </div>
    </header>
    
    <div class="filters-scroll">
        <div class="filter-chip active" onclick="filterPosts('all', this)">الكل</div>
        <div class="filter-chip" onclick="filterPosts('following', this)">متابعون</div>
        <div class="filter-chip" onclick="filterPosts('popular', this)">الأكثر تفاعلاً</div>
        <div class="filter-chip" onclick="filterPosts('new', this)">جديد</div>
    </div>
    
    <main id="posts-container">
        <div class="loading"><i class="fas fa-spinner fa-spin"></i> جاري تحميل المنشورات...</div>
    </main>
    
    <button class="fab-write" onclick="openPostModal()"><i class="fas fa-pen"></i></button>
    
    <nav class="bottom-nav">
        <a href="home.html" class="nav-item"><i class="fas fa-home"></i><span>الرئيسية</span></a>
        <a href="feed.html" class="nav-item active"><i class="fas fa-newspaper"></i><span>المنشورات</span></a>
        <a href="chat.html" class="nav-item"><i class="fas fa-comment-dots"></i><span>الدردشة</span></a>
        <a href="friends.html" class="nav-item"><i class="fas fa-user-friends"></i><span>الأصدقاء</span></a>
        <a href="profile.html" class="nav-item"><i class="fas fa-user"></i><span>حسابي</span></a>
    </nav>
    
    <!-- مودال إنشاء منشور -->
    <div class="modal-overlay" id="postModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">نشر منشور جديد</h3>
                <button class="close-modal" onclick="closePostModal()">&times;</button>
            </div>
            <textarea class="form-input form-textarea" id="post-content" placeholder="بماذا تفكر؟ اكتب منشورك هنا..." maxlength="500"></textarea>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <span style="font-size: 0.8rem; color: var(--text-secondary);" id="char-count">0/500</span>
            </div>
            <button class="btn-submit" id="post-submit" onclick="createPost()">نشر المنشور <i class="fas fa-paper-plane"></i></button>
        </div>
    </div>
    
    <!-- مودال البروفايل -->
    <div class="profile-modal-overlay" id="profileModal">
        <div class="profile-modal">
            <button class="close-modal" onclick="closeProfile()"><i class="fas fa-times"></i></button>
            <div class="profile-header">
                <img src="" alt="Profile" class="profile-avatar-large" id="modal-img">
                <h2 class="profile-name" id="modal-name">اسم المستخدم</h2>
                <p class="profile-bio" id="modal-bio">نبذة المستخدم</p>
                <div class="profile-stats-row">
                    <div class="stat-item"><b id="modal-posts">0</b><span>منشور</span></div>
                    <div class="stat-item"><b id="modal-followers">0</b><span>متابع</span></div>
                    <div class="stat-item"><b id="modal-following">0</b><span>يتابع</span></div>
                </div>
                <button style="width: 100%; padding: 12px; background: var(--primary-gradient); color: white; border: none; border-radius: 12px; font-weight: 700; cursor: pointer;" onclick="followUser()">متابعة</button>
            </div>
            <h3 class="profile-posts-title">منشورات المستخدم</h3>
            <div id="modal-posts-list"></div>
        </div>
    </div>
    
    <!-- مودال المشاركة -->
    <div class="modal-overlay" id="shareModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">مشاركة المنشور</h3>
                <button class="close-modal" onclick="closeModal('shareModal')">&times;</button>
            </div>
            <div class="share-options">
                <div class="share-option" onclick="shareTo('whatsapp')"><i class="fab fa-whatsapp" style="color: #25D366;"></i><span>واتساب</span></div>
                <div class="share-option" onclick="shareTo('twitter')"><i class="fab fa-twitter" style="color: #1DA1F2;"></i><span>تويتر</span></div>
                <div class="share-option" onclick="shareTo('facebook')"><i class="fab fa-facebook" style="color: #1877F2;"></i><span>فيسبوك</span></div>
                <div class="share-option" onclick="shareTo('copy')"><i class="fas fa-link" style="color: var(--primary-color);"></i><span>نسخ الرابط</span></div>
            </div>
            <div class="copy-link"><input type="text" id="share-link" readonly value=""><button onclick="copyLink()"><i class="fas fa-copy"></i> نسخ</button></div>
        </div>
    </div>

    <script type="module">
        console.log('🚀 === FEED PAGE STARTING ===');
        
        import { 
            db, collection, query, orderBy, limit, onSnapshot, doc, getDoc, 
            updateDoc, addDoc, arrayUnion, arrayRemove, serverTimestamp, increment, where 
        } from './firebase-config.js';
        
        console.log('✅ Firebase imported');

        const currentUser = JSON.parse(localStorage.getItem('currentUser'));
        console.log('👤 Current User:', currentUser);
        
        if (!currentUser || !currentUser.isLoggedIn) {
            console.warn('⚠️ No user logged in, redirecting...');
            setTimeout(() => { window.location.href = 'index.html'; }, 1000);
        }

        let allPosts = [];
        let currentFilter = 'all';
        let currentSharePostId = null;

        // === تحميل المنشورات في الوقت الفعلي ===
        console.log('📥 Loading posts...');
        const postsQuery = query(collection(db, "posts"), orderBy("timestamp", "desc"), limit(50));
        
        onSnapshot(postsQuery, (snapshot) => {
            console.log('📊 Posts snapshot:', snapshot.size);
            allPosts = [];
            snapshot.forEach(doc => {
                allPosts.push({ id: doc.id, ...doc.data() });
            });
            renderPosts();
            console.log('✅ Posts rendered:', allPosts.length);
        }, (error) => {
            console.error('❌ Error loading posts:', error);
            document.getElementById('posts-container').innerHTML = `
                <div class="loading" style="color: var(--danger-color);">
                    ❌ خطأ في تحميل المنشورات: ${error.message}
                    <br><br>
                    <button onclick="location.reload()" style="padding:10px 20px; background:var(--primary-color); color:white; border:none; border-radius:8px; cursor:pointer;">إعادة المحاولة</button>
                </div>
            `;
        });

        // === دالة مساعدة لضمان أن القيمة مصفوفة ===
        function ensureArray(value) {
            if (Array.isArray(value)) return value;
            if (value === null || value === undefined) return [];
            return [];
        }

        // === عرض المنشورات ===
        function renderPosts() {
            const container = document.getElementById('posts-container');
            let postsToShow = [...allPosts];
            
            if (currentFilter === 'popular') {
                postsToShow.sort((a, b) => (b.likesCount || 0) - (a.likesCount || 0));
            } else if (currentFilter === 'new') {
                postsToShow.sort((a, b) => {
                    const timeA = a.timestamp?.toDate?.() || a.timestamp || 0;
                    const timeB = b.timestamp?.toDate?.() || b.timestamp || 0;
                    return new Date(timeB) - new Date(timeA);
                });
            }
            
            if (postsToShow.length === 0) {
                container.innerHTML = `
                    <div style="text-align:center; padding:60px 20px; color:var(--text-secondary);">
                        <i class="fas fa-inbox" style="font-size:4rem; margin-bottom:20px; opacity:0.3;"></i>
                        <p>لا توجد منشورات حالياً</p>
                        <p style="font-size:0.9rem; margin-top:10px;">كن أول من ينشر! ✨</p>
                        <button class="fab-write" style="position:static; margin:20px auto;" onclick="openPostModal()">
                            <i class="fas fa-pen"></i> نشر منشور
                        </button>
                    </div>
                `;
                return;
            }

            container.innerHTML = postsToShow.map(post => {
                const isLiked = Array.isArray(post.likes) && post.likes.includes(currentUser.uid);
                const isSaved = Array.isArray(post.saves) && post.saves.includes(currentUser.uid);
                
                // ✅ تصحيح: ضمان أن التعليقات مصفوفة
                const comments = ensureArray(post.comments);
                
                return `
                <div class="post-card" id="post-${post.id}">
                    <div class="post-header">
                        <div class="post-user" onclick="openProfile('${post.userId}')">
                            <img src="${post.userAvatar || 'https://i.pravatar.cc/150?u=' + post.userId}" alt="${post.userName}" class="post-avatar">
                            <div class="post-user-info">
                                <h4>${post.userName}</h4>
                                <span>${formatTime(post.timestamp)}</span>
                            </div>
                        </div>
                        <div class="post-options" onclick="togglePostOptions('${post.id}')">
                            <i class="fas fa-ellipsis-h"></i>
                        </div>
                    </div>
                    
                    <div class="post-content">${escapeHtml(post.content)}</div>
                    
                    <div class="post-stats">
                        <span><i class="fas fa-heart" style="color: var(--like-color)"></i> ${post.likesCount || 0} إعجاب</span>
                        <span>${comments.length || 0} تعليق</span>
                    </div>
                    
                    <div class="post-actions">
                        <button class="action-btn ${isLiked ? 'liked' : ''}" onclick="toggleLike('${post.id}')">
                            <i class="${isLiked ? 'fas' : 'far'} fa-heart"></i>
                            <span>إعجاب</span>
                        </button>
                        <button class="action-btn" onclick="toggleComments('${post.id}')">
                            <i class="far fa-comment"></i>
                            <span>تعليق</span>
                        </button>
                        <button class="action-btn" onclick="openShareModal('${post.id}')">
                            <i class="far fa-share-square"></i>
                            <span>مشاركة</span>
                        </button>
                        <button class="action-btn ${isSaved ? 'saved' : ''}" onclick="toggleSave('${post.id}')">
                            <i class="${isSaved ? 'fas' : 'far'} fa-bookmark"></i>
                            <span>حفظ</span>
                        </button>
                    </div>
                    
                    <!-- قسم التعليقات (مصحح) -->
                    <div class="comments-section" id="comments-${post.id}">
                        <div id="comments-list-${post.id}">
                            ${comments.length > 0 ? 
                                comments.slice(0, 3).map(c => {
                                    if (!c || typeof c !== 'object') return '';
                                    return `
                                    <div class="comment-item">
                                        <img src="${c.userAvatar || 'https://i.pravatar.cc/150?u=' + (c.userId || '')}" class="comment-avatar">
                                        <div class="comment-content">
                                            <div class="comment-header">
                                                <span class="comment-author">${escapeHtml(c.userName || 'مستخدم')}</span>
                                                <span class="comment-time">${formatTime(c.timestamp)}</span>
                                            </div>
                                            <div class="comment-text">${escapeHtml(c.text || '')}</div>
                                        </div>
                                    </div>
                                    `;
                                }).join('') 
                                : '<div style="text-align:center; color:var(--text-secondary); padding:10px;">لا توجد تعليقات بعد</div>'
                            }
                            ${comments.length > 3 ? `<div style="text-align:center; color:var(--primary-color); cursor:pointer; font-size:0.85rem;" onclick="viewAllComments('${post.id}')">عرض جميع التعليقات (${comments.length})</div>` : ''}
                        </div>
                        <div class="comment-input-wrapper">
                            <input type="text" class="comment-input" id="comment-input-${post.id}" placeholder="اكتب تعليقاً..." onkeypress="handleCommentKey(event, '${post.id}')">
                            <button class="comment-send" onclick="addComment('${post.id}')"><i class="fas fa-paper-plane"></i></button>
                        </div>
                    </div>
                </div>
                `;
            }).join('');
        }

        // === فلاتر المنشورات ===
        window.filterPosts = function(filter, element) {
            currentFilter = filter;
            document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
            element.classList.add('active');
            renderPosts();
        }

        // === الإعجاب ===
        window.toggleLike = async function(postId) {
            try {
                const postRef = doc(db, "posts", postId);
                const post = allPosts.find(p => p.id === postId);
                const isLiked = Array.isArray(post?.likes) && post.likes.includes(currentUser.uid);
                
                if (isLiked) {
                    await updateDoc(postRef, {
                        likesCount: increment(-1),
                        likes: arrayRemove(currentUser.uid)
                    });
                } else {
                    await updateDoc(postRef, {
                        likesCount: increment(1),
                        likes: arrayUnion(currentUser.uid)
                    });
                    if (post?.userId !== currentUser.uid) {
                        await addDoc(collection(db, "notifications"), {
                            type: 'like',
                            targetUserId: post.userId,
                            senderId: currentUser.uid,
                            senderName: currentUser.fullName,
                            postId: postId,
                            title: '❤️ أعجب بمنشورك',
                            body: `${currentUser.fullName} أعجب بمنشورك`,
                            isRead: false,
                            timestamp: serverTimestamp()
                        });
                    }
                }
            } catch (error) { console.error('❌ Error toggling like:', error); }
        }

        // === الحفظ ===
        window.toggleSave = async function(postId) {
            try {
                const postRef = doc(db, "posts", postId);
                const post = allPosts.find(p => p.id === postId);
                const isSaved = Array.isArray(post?.saves) && post.saves.includes(currentUser.uid);
                if (isSaved) {
                    await updateDoc(postRef, { saves: arrayRemove(currentUser.uid) });
                } else {
                    await updateDoc(postRef, { saves: arrayUnion(currentUser.uid) });
                }
            } catch (error) { console.error('❌ Error toggling save:', error); }
        }

        // === التعليقات ===
        window.toggleComments = function(postId) {
            const section = document.getElementById(`comments-${postId}`);
            section.classList.toggle('show');
            if (section.classList.contains('show')) document.getElementById(`comment-input-${postId}`).focus();
        }

        window.handleCommentKey = function(e, postId) {
            if (e.key === 'Enter') { e.preventDefault(); addComment(postId); }
        }

        window.addComment = async function(postId) {
            const input = document.getElementById(`comment-input-${postId}`);
            const text = input.value.trim();
            if (!text) return;
            try {
                const postRef = doc(db, "posts", postId);
                const post = allPosts.find(p => p.id === postId);
                await updateDoc(postRef, {
                    comments: arrayUnion({
                        commentId: 'c_' + Date.now(),
                        userId: currentUser.uid,
                        userName: currentUser.fullName,
                        userAvatar: currentUser.profileImage || '',
                        text: text,
                        timestamp: serverTimestamp(),
                        likes: 0
                    }),
                    commentsCount: increment(1)
                });
                if (post?.userId !== currentUser.uid) {
                    await addDoc(collection(db, "notifications"), {
                        type: 'comment',
                        targetUserId: post.userId,
                        senderId: currentUser.uid,
                        senderName: currentUser.fullName,
                        postId: postId,
                        title: '💬 علق على منشورك',
                        body: `${currentUser.fullName}: ${text.substring(0, 50)}...`,
                        isRead: false,
                        timestamp: serverTimestamp()
                    });
                }
                input.value = '';
            } catch (error) { console.error('❌ Error adding comment:', error); alert('حدث خطأ: ' + error.message); }
        }

        window.viewAllComments = function(postId) { toggleComments(postId); alert('عرض جميع التعليقات (قريباً) 🔜'); }

        // === إنشاء منشور جديد ===
        window.openPostModal = function() { document.getElementById('postModal').classList.add('show'); document.getElementById('post-content').focus(); }
        window.closePostModal = function() { document.getElementById('postModal').classList.remove('show'); document.getElementById('post-content').value = ''; document.getElementById('char-count').textContent = '0/500'; }
        document.getElementById('post-content')?.addEventListener('input', function() { const count = this.value.length; document.getElementById('char-count').textContent = `${count}/500`; document.getElementById('post-submit').disabled = count === 0 || count > 500; });

        window.createPost = async function() {
            const content = document.getElementById('post-content').value.trim();
            const submitBtn = document.getElementById('post-submit');
            if (!content) { alert('⚠️ اكتب محتوى للمنشور أولاً'); return; }
            if (content.length > 500) { alert('⚠️ المنشور طويل جداً (الحد الأقصى 500 حرف)'); return; }
            submitBtn.disabled = true; submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري النشر...';
            try {
                await addDoc(collection(db, "posts"), {
                    userId: currentUser.uid,
                    userName: currentUser.fullName,
                    userAvatar: currentUser.profileImage || '',
                    content: content,
                    likesCount: 0, commentsCount: 0, sharesCount: 0, savesCount: 0,
                    timestamp: serverTimestamp(),
                    isPinned: false,
                    likes: [], saves: [], comments: []
                });
                closePostModal(); alert('✅ تم نشر منشورك بنجاح! 🎉');
            } catch (error) { console.error('❌ Error creating post:', error); alert('حدث خطأ أثناء النشر: ' + error.message); }
            finally { submitBtn.disabled = false; submitBtn.innerHTML = 'نشر المنشور <i class="fas fa-paper-plane"></i>'; }
        }

        // === المشاركة ===
        window.openShareModal = function(postId) {
            currentSharePostId = postId;
            const post = allPosts.find(p => p.id === postId);
            const shareUrl = `${window.location.origin}${window.location.pathname}?post=${postId}`;
            document.getElementById('share-link').value = shareUrl;
            document.getElementById('shareModal').classList.add('show');
        }
        window.shareTo = function(platform) {
            const post = allPosts.find(p => p.id === currentSharePostId);
            const shareUrl = `${window.location.origin}${window.location.pathname}?post=${currentSharePostId}`;
            const shareText = `📝 منشور من ${post?.userName}:\n${post?.content?.substring(0, 100)}...\n\n🔗 ${shareUrl}`;
            switch(platform) {
                case 'whatsapp': window.open(`https://wa.me/?text=${encodeURIComponent(shareText)}`, '_blank'); break;
                case 'twitter': window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(shareText)}`, '_blank'); break;
                case 'facebook': window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(shareUrl)}`, '_blank'); break;
                case 'copy': copyLink(); break;
            }
            if (post) updateDoc(doc(db, "posts", currentSharePostId), { sharesCount: increment(1) });
            closeModal('shareModal');
        }
        window.copyLink = function() { const input = document.getElementById('share-link'); input.select(); document.execCommand('copy'); alert('✅ تم نسخ الرابط!'); }

        // === البروفايل ===
        const profileModal = document.getElementById('profileModal');
        let currentProfileUserId = null;
        window.openProfile = async function(userId) {
            currentProfileUserId = userId;
            try {
                const userRef = doc(db, "users", userId);
                const userSnap = await getDoc(userRef);
                if (userSnap.exists()) {
                    const user = userSnap.data();
                    document.getElementById('modal-name').textContent = user.fullName;
                    document.getElementById('modal-img').src = user.profileImage || 'https://i.pravatar.cc/150?u=' + userId;
                    document.getElementById('modal-bio').textContent = user.bio || 'لا توجد نبذة';
                    document.getElementById('modal-posts').textContent = user.stats?.postsCount || 0;
                    document.getElementById('modal-followers').textContent = user.stats?.followersCount || 0;
                    document.getElementById('modal-following').textContent = user.stats?.friendsCount || 0;
                    const userPostsQuery = query(collection(db, "posts"), where("userId", "==", userId), orderBy("timestamp", "desc"), limit(10));
                    const postsSnap = await getDocs(userPostsQuery);
                    const userPosts = [];
                    postsSnap.forEach(doc => { userPosts.push({ id: doc.id, ...doc.data() }); });
                    document.getElementById('modal-posts-list').innerHTML = userPosts.map(post => `
                        <div style="background: var(--input-bg); padding: 15px; border-radius: 12px; margin-bottom: 10px;">
                            ${escapeHtml(post.content.substring(0, 100))}${post.content.length > 100 ? '...' : ''}
                            <div style="font-size:0.75rem; color:var(--text-secondary); margin-top:8px;"><i class="fas fa-heart"></i> ${post.likesCount || 0} • <i class="fas fa-comment"></i> ${post.commentsCount || 0}</div>
                        </div>
                    `).join('') || '<div style="text-align:center; color:var(--text-secondary); padding:20px;">لا توجد منشورات</div>';
                    profileModal.classList.add('show');
                }
            } catch (error) { console.error('❌ Error loading profile:', error); }
        }
        window.closeProfile = function() { profileModal.classList.remove('show'); currentProfileUserId = null; }
        window.followUser = async function() {
            if (!currentProfileUserId) return;
            try {
                await updateDoc(doc(db, "users", currentUser.uid), { following: arrayUnion(currentProfileUserId), 'stats.friendsCount': increment(1) });
                await updateDoc(doc(db, "users", currentProfileUserId), { followers: arrayUnion(currentUser.uid), 'stats.followersCount': increment(1) });
                await addDoc(collection(db, "notifications"), { type: 'follow', targetUserId: currentProfileUserId, senderId: currentUser.uid, senderName: currentUser.fullName, title: '👤 بدأ متابعتك', body: `${currentUser.fullName} بدأ متابعتك`, isRead: false, timestamp: serverTimestamp() });
                alert('✅ تمت المتابعة بنجاح');
            } catch (error) { console.error('❌ Error following:', error); }
        }

        // === وظائف مساعدة ===
        function escapeHtml(text) { const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
        function formatTime(timestamp) { if (!timestamp) return ''; const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp); const now = new Date(); const diff = now - date; if (diff < 60000) return 'الآن'; if (diff < 3600000) return Math.floor(diff / 60000) + ' دقيقة'; if (diff < 86400000) return Math.floor(diff / 3600000) + ' ساعة'; return date.toLocaleDateString('ar-SA'); }
        window.refreshPosts = function() { console.log('🔄 Refreshing posts...'); alert('✅ تم تحديث المنشورات'); }
        window.closeModal = function(id) { document.getElementById(id).classList.remove('show'); }
        document.querySelectorAll('.modal-overlay').forEach(modal => { modal.addEventListener('click', (e) => { if (e.target === modal) modal.classList.remove('show'); }); });
        document.getElementById('theme-toggle')?.addEventListener('click', () => { document.body.classList.toggle('dark-mode'); const icon = document.querySelector('#theme-toggle i'); icon?.classList.toggle('fa-moon'); icon?.classList.toggle('fa-sun'); });
        console.log('🚀 === FEED PAGE READY ===');
    </script>
</body>
</html>
